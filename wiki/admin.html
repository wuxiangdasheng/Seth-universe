<!DOCTYPE html>
<html lang="zh-CN" data-activeWorld="concept-world">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内容管理 - 赛斯宇宙</title>
<noscript></noscript>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#050508;--bg-surface:#0c0c12;--bg-elevated:#141420;--bg-card:#101018;--bg-card-hover:#181824;--bg-input:#09090f;
  --border-subtle:rgba(255,255,255,0.055);--border-active:rgba(180,160,100,0.34);--border-strong:rgba(180,160,100,0.16);
  --gold:#b4a064;--gold-bright:#d4c088;--gold-dim:#8a7a52;--gold-glow:rgba(180,160,100,0.08);--gold-glow2:rgba(180,160,100,0.04);
  --star:#e8e0d0;--text-primary:#e0dcd0;--text-secondary:#a09880;--text-muted:#5d5645;
  --accent-red:#c96262;--accent-green:#6fa56f;--accent-blue:#6b8fa3;
  --font-serif:"PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;--font-display:"PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;--font-zh-title:"PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;--font-zh-body:"PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --prism-expanded-w:260px;--prism-collapsed-w:56px;--prism-w:var(--prism-expanded-w);--header-h:56px;--list-w:340px;
}
html{font-size:15px;scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-zh-body);line-height:1.7;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.62;background-image:
  radial-gradient(1px 1px at 10% 20%,rgba(200,190,160,.42),transparent),
  radial-gradient(1px 1px at 25% 45%,rgba(200,190,160,.3),transparent),
  radial-gradient(1.2px 1.2px at 40% 15%,rgba(220,210,180,.5),transparent),
  radial-gradient(1px 1px at 55% 70%,rgba(200,190,160,.28),transparent),
  radial-gradient(1px 1px at 70% 30%,rgba(200,190,160,.38),transparent),
  radial-gradient(1.5px 1.5px at 85% 55%,rgba(220,210,180,.48),transparent),
  radial-gradient(1px 1px at 15% 80%,rgba(200,190,160,.3),transparent),
  radial-gradient(1px 1px at 30% 60%,rgba(200,190,160,.2),transparent),
  radial-gradient(1.2px 1.2px at 50% 85%,rgba(220,210,180,.38),transparent),
  radial-gradient(1px 1px at 75% 10%,rgba(200,190,160,.3),transparent),
  radial-gradient(1px 1px at 90% 75%,rgba(200,190,160,.2),transparent),
  radial-gradient(1.3px 1.3px at 60% 40%,rgba(220,210,180,.4),transparent)}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.015;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
button,input,textarea,select{font:inherit}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:1px solid var(--gold);outline-offset:2px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(180,160,100,.14);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(180,160,100,.28)}

#prism-nav{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--prism-expanded-w);background:var(--bg-surface);border-right:1px solid var(--border-subtle);z-index:55;display:flex;flex-direction:column;transition:width .28s cubic-bezier(.22,1,.36,1);overflow:visible}
#prism-nav.pn-collapsed{width:var(--prism-collapsed-w)}
.pn-inner{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;padding:20px 0 12px}
.pn-nodes{display:flex;flex-direction:column;gap:4px;padding:0 8px;flex:1}
.pn-node{border-radius:8px;overflow:hidden;transition:background .2s}
.pn-node.pn-node-expanded{background:rgba(255,255,255,.015)}
.pn-node-trigger{display:flex;align-items:center;gap:10px;padding:10px 8px;text-decoration:none;color:var(--text-secondary);transition:all .2s;position:relative;border-radius:8px}
.pn-node-trigger:hover{background:rgba(255,255,255,.02);color:var(--text-primary)}
.pn-node-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .28s cubic-bezier(.34,1.56,.64,1)}
.pn-node-icon svg{width:100%;height:100%}
.pn-node-trigger:hover .pn-node-icon{transform:scale(1.08)}
.pn-node-label{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pn-node-label-en{font-family:var(--font-serif);font-size:13px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pn-collapsed .pn-node-label,.pn-collapsed .pn-node-label-en{opacity:0;pointer-events:none;position:absolute;width:1px;height:1px;overflow:hidden}
.pn-node-active>.pn-node-trigger{color:var(--text-primary);font-weight:600}
.pn-node-glow{position:absolute;left:0;top:10%;bottom:10%;width:2.5px;background:linear-gradient(180deg,transparent,var(--gold),transparent);border-radius:0 2px 2px 0}
.pn-node-subs{max-height:0;overflow:hidden;opacity:0;padding:0 6px 0 34px;transition:max-height .34s cubic-bezier(.4,0,.2,1),opacity .2s}
.pn-node-expanded .pn-node-subs{max-height:620px;opacity:1;padding:2px 6px 8px 34px}
.pn-collapsed .pn-node-subs{max-height:0!important;opacity:0!important;padding:0!important}
.pn-sub{display:flex;align-items:flex-start;gap:6px;padding:5px 3px;text-decoration:none;border-radius:5px;transition:background .12s}
.pn-sub:hover{background:rgba(255,255,255,.02)}
.pn-sub-dot{width:3.5px;height:3.5px;border-radius:50%;background:var(--text-muted);margin-top:5.5px;flex-shrink:0}
.pn-sub:hover .pn-sub-dot{background:var(--gold)}
.pn-sub-text{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.pn-sub-label{font-size:15px;color:var(--text-secondary)}
.pn-sub:hover .pn-sub-label{color:var(--text-primary)}
.pn-sub-desc{font-family:var(--font-serif);font-size:13px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pn-toggle{position:absolute;top:50%;right:-11px;transform:translateY(-50%);width:22px;height:48px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:0 6px 6px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;transition:all .2s;z-index:56}
.pn-toggle:hover{background:var(--bg-card-hover);color:var(--gold);border-color:var(--border-active)}
.pn-toggle-text{display:none}

.header{position:fixed;top:0;left:var(--prism-w);right:0;height:var(--header-h);z-index:100;display:flex;align-items:center;justify-content:space-between;gap:20px;padding:0 24px;background:rgba(5,5,8,.86);backdrop-filter:blur(20px) saturate(1.1);border-bottom:1px solid var(--border-subtle);transition:left .28s cubic-bezier(.22,1,.36,1)}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.logo-mark{width:26px;height:26px;display:grid;place-items:center;color:var(--gold);font-family:var(--font-display);font-size:21px;font-style:italic}
.brand a{font-family:var(--font-zh-title);font-size:16px;font-weight:600;letter-spacing:.08em;color:var(--text-primary);text-decoration:none;white-space:nowrap}
.admin-flag{padding:3px 8px;border:1px solid var(--border-strong);background:var(--gold-glow2);color:var(--gold);border-radius:3px;font-family:var(--font-serif);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.header-title{min-width:0;flex:1;color:var(--text-muted);font-family:var(--font-serif);font-size:15px;font-style:italic;letter-spacing:.08em}
.header-actions{display:flex;align-items:center;gap:8px}

.workspace{position:relative;z-index:1;margin-left:var(--prism-w);padding-top:var(--header-h);height:100vh;display:grid;grid-template-columns:var(--list-w) minmax(0,1fr);transition:margin-left .28s cubic-bezier(.22,1,.36,1)}
.concept-rail{min-height:0;background:linear-gradient(180deg,rgba(12,12,18,.98),rgba(12,12,18,.88));border-right:1px solid var(--border-subtle);display:flex;flex-direction:column}
.rail-top{padding:18px 18px 14px;border-bottom:1px solid var(--border-subtle)}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{padding:10px 12px;background:rgba(255,255,255,.018);border:1px solid var(--border-subtle);border-radius:6px}
.metric-value{font-family:var(--font-display);font-size:24px;line-height:1;color:var(--gold);font-variant-numeric:tabular-nums}
.metric-label{margin-top:4px;color:var(--text-muted);font-family:var(--font-serif);font-size:12px;letter-spacing:.12em;text-transform:uppercase}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:6px;padding:8px 10px;transition:border-color .18s,background .18s}
.search-box:focus-within{border-color:var(--border-active);background:#0d0d14}
.search-box svg{width:15px;height:15px;color:var(--text-muted);flex-shrink:0}
.search-box input{width:100%;border:0;background:transparent;color:var(--text-primary);outline:0;font-size:14px}
.search-box input::placeholder{color:var(--text-muted)}
.rail-label{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 8px;color:var(--text-muted);font-family:var(--font-serif);font-size:12px;letter-spacing:.18em;text-transform:uppercase}
.rail-list{min-height:0;flex:1;overflow-y:auto;padding-bottom:18px}
.concept-item{width:100%;display:grid;grid-template-columns:8px minmax(0,1fr) auto;gap:10px;align-items:center;padding:10px 18px;border:0;border-bottom:1px solid rgba(255,255,255,.025);background:transparent;color:inherit;text-align:left;cursor:pointer;transition:background .16s,border-color .16s}
.concept-item:hover{background:rgba(255,255,255,.018)}
.concept-item.active{background:linear-gradient(90deg,var(--gold-glow),transparent);border-left:2px solid var(--gold);padding-left:16px}
.concept-dot{width:5px;height:5px;border-radius:50%;background:var(--text-muted)}
.concept-item.active .concept-dot{background:var(--gold)}
.concept-name{font-family:var(--font-zh-title);font-size:15px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.concept-en{font-family:var(--font-serif);font-size:13px;color:var(--text-muted);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.concept-count{min-width:32px;padding:2px 6px;text-align:center;border-radius:3px;background:var(--gold-glow2);color:var(--gold-dim);font-family:var(--font-serif);font-size:12px;font-variant-numeric:tabular-nums}
.empty-inline{padding:30px 18px;text-align:center;color:var(--text-muted);font-size:14px}

.editor{min-width:0;min-height:0;overflow-y:auto;padding:28px clamp(24px,4vw,52px) 80px;background:linear-gradient(135deg,rgba(180,160,100,.025),transparent 32%),linear-gradient(180deg,rgba(5,5,8,.1),rgba(5,5,8,.72))}
.editor-shell{max-width:1040px;margin:0 auto}
.empty-editor{min-height:calc(100vh - var(--header-h) - 56px);display:grid;place-items:center;text-align:center;color:var(--text-muted)}
.empty-card{width:min(480px,100%);padding:40px 32px;border:1px solid var(--border-subtle);border-radius:8px;background:rgba(16,16,24,.55)}
.empty-card svg{width:42px;height:42px;color:var(--gold-dim);margin-bottom:16px}
.empty-card h1{font-family:var(--font-zh-title);font-size:22px;font-weight:400;color:var(--star);margin-bottom:8px}
.empty-card p{font-family:var(--font-serif);font-size:15px;color:var(--text-muted);font-style:italic}
.edit-form{display:none}
.editor-head{position:sticky;top:-28px;z-index:20;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding:18px 0 16px;margin-bottom:18px;background:linear-gradient(180deg,var(--bg-deep) 72%,rgba(5,5,8,.86));border-bottom:1px solid var(--border-subtle)}
.eyebrow{font-family:var(--font-serif);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:4px}
.edit-title{font-family:var(--font-zh-title);font-size:26px;font-weight:500;line-height:1.25;color:var(--star);text-wrap:balance}
.edit-actions{display:flex;gap:8px;flex-shrink:0}
.autosave-status{min-width:64px;align-self:center;color:var(--text-muted);font-size:12px;text-align:right}
.autosave-status.saving{color:var(--gold-dim)}
.autosave-status.saved{color:var(--accent-green)}
.autosave-status.error{color:var(--accent-red)}
.panel{padding:20px;margin-bottom:16px;background:rgba(16,16,24,.7);border:1px solid var(--border-subtle);border-radius:8px}
.panel.compact{padding:0;overflow:hidden}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.form-group{margin-bottom:14px}
.form-group:last-child{margin-bottom:0}
.form-label{display:block;margin-bottom:6px;color:var(--text-secondary);font-family:var(--font-serif);font-size:12px;letter-spacing:.1em;text-transform:uppercase}
.required{color:var(--accent-red);margin-left:3px}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 12px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:6px;color:var(--text-primary);font-size:14px;transition:border-color .18s,background .18s}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--border-active);background:#0d0d14;outline:0}
.form-textarea{min-height:86px;resize:vertical;line-height:1.78}
.flat-editor{display:block;width:100%;min-height:1.9em;border:0;background:transparent;padding:0;color:var(--text-primary);line-height:1.9;white-space:pre-wrap;overflow-wrap:anywhere}
.flat-editor:focus{outline:1px solid var(--border-active);outline-offset:5px}
.flat-editor:empty::before{content:attr(data-placeholder);color:var(--text-muted)}
.flat-editor.quote-zh{font-size:15px;color:var(--text-primary);font-weight:500}
.flat-editor.quote-en{font-family:var(--font-serif);font-size:15px;color:var(--text-secondary);font-style:italic}
.flat-editor.definition-en{font-family:var(--font-serif);font-size:15px;color:var(--text-secondary);font-style:italic}
.flat-editor.definition-zh{font-size:15px;color:var(--text-primary)}
.flat-pair{display:grid;gap:10px}
.flat-pair+.flat-pair{margin-top:8px}
.quote-meta-grid{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(96px,.7fr) minmax(96px,.7fr);gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border-subtle)}
.quote-meta-field{min-width:0}
.quote-meta-label{display:block;margin-bottom:5px;color:var(--text-muted);font-size:12px}
.quote-meta-input{width:100%;height:34px;padding:7px 9px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:6px;color:var(--text-primary);font-size:13px;transition:border-color .18s,background .18s}
.quote-meta-input:focus{border-color:var(--border-active);background:#0d0d14;outline:0}
.quote-save-status{grid-column:1/-1;min-height:16px;color:var(--text-muted);font-size:12px;text-align:right}
.quote-save-status.saving{color:var(--gold-dim)}
.quote-save-status.saved{color:var(--accent-green)}
.quote-save-status.error{color:var(--accent-red)}
.text-tall{min-height:120px}
.text-short{min-height:66px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:22px 0 10px;padding-bottom:9px;border-bottom:1px solid var(--border-subtle)}
.section-title{display:flex;align-items:center;gap:8px;font-family:var(--font-zh-title);font-size:15px;font-weight:600;color:var(--text-primary)}
.section-title::before{content:'';width:2px;height:14px;background:var(--gold);border-radius:2px}
.section-tools{display:flex;gap:6px}
.definition-list,.quote-list{display:grid;gap:10px}
.definition-item,.quote-item{padding:14px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:7px}
.item-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.item-title{color:var(--text-muted);font-family:var(--font-serif);font-size:13px;letter-spacing:.08em}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:34px;padding:7px 13px;border:1px solid var(--border-subtle);border-radius:6px;background:var(--bg-elevated);color:var(--text-secondary);font-size:14px;font-weight:500;text-decoration:none;cursor:pointer;transition:background .18s,border-color .18s,color .18s,transform .18s}
.btn svg{width:15px;height:15px;flex-shrink:0}
.btn:hover{background:var(--bg-card-hover);border-color:var(--border-active);color:var(--text-primary)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-primary{background:var(--gold);border-color:var(--gold);color:var(--bg-deep)}
.btn-primary:hover{background:var(--gold-bright);border-color:var(--gold-bright);color:var(--bg-deep)}
.btn-danger{background:rgba(201,98,98,.12);border-color:rgba(201,98,98,.24);color:#e68a8a}
.btn-danger:hover{background:rgba(201,98,98,.2);border-color:rgba(201,98,98,.36);color:#f0a0a0}
.btn-sm{min-height:30px;padding:5px 10px;font-size:13px}
.btn-icon{width:30px;padding:0;font-size:18px;line-height:1}
.loading-spinner{width:14px;height:14px;border:1.5px solid rgba(5,5,8,.28);border-top-color:var(--bg-deep);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.confirm-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.62);backdrop-filter:blur(8px);opacity:0;visibility:hidden;transition:opacity .24s,visibility .24s}
.confirm-overlay.active{opacity:1;visibility:visible}
.confirm-box{width:min(420px,100%);padding:24px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:8px;box-shadow:0 22px 70px rgba(0,0,0,.48);transform:translateY(-10px);transition:transform .24s cubic-bezier(.16,1,.3,1)}
.confirm-overlay.active .confirm-box{transform:translateY(0)}
.confirm-text{font-size:16px;line-height:1.8;margin-bottom:12px}
.confirm-warning{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px 12px;background:rgba(201,98,98,.09);border:1px solid rgba(201,98,98,.18);border-radius:6px;color:#e68a8a;font-size:13px}
.confirm-actions{display:flex;justify-content:flex-end;gap:8px}
.toast-container{position:fixed;top:calc(var(--header-h) + 12px);right:16px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{min-width:260px;max-width:min(420px,calc(100vw - 32px));display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:7px;box-shadow:0 14px 36px rgba(0,0,0,.42);transform:translateX(120%);transition:transform .25s cubic-bezier(.16,1,.3,1)}
.toast.show{transform:translateX(0)}
.toast.success{border-left:2px solid var(--accent-green)}
.toast.error{border-left:2px solid var(--accent-red)}
.toast-icon{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--accent-green)}
.toast.error .toast-icon{background:var(--accent-red)}
.toast-message{font-size:13px;color:var(--text-primary)}

@media(max-width:980px){
  #prism-nav{display:none}
  :root{--prism-w:0px;--list-w:100%}
  .header{left:0;padding:0 16px}
  .header-title{display:none}
  .workspace{margin-left:0;height:auto;min-height:100vh;display:block}
  .concept-rail{height:auto;max-height:48vh;border-right:0;border-bottom:1px solid var(--border-subtle)}
  .rail-list{max-height:28vh}
  .editor{min-height:60vh;padding:22px 16px 70px}
  .editor-head{top:-22px;align-items:flex-start;flex-direction:column}
}
@media(max-width:640px){
  html{font-size:14px}
  .brand a{font-size:14px}
  .admin-flag{display:none}
  .header-actions .btn span{display:none}
  .form-grid{grid-template-columns:1fr}
  .panel{padding:16px}
  .edit-title{font-size:22px}
  .section-head{align-items:flex-start;flex-direction:column}
  .quote-meta-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header class="header">
  <div class="brand">
    <div class="logo-mark">S</div>
    <a href="index.html">赛斯宇宙</a>
    <span class="admin-flag">Admin</span>
  </div>
  <div class="header-title">Content Management</div>
  <div class="header-actions">
    <button class="btn" type="button" onclick="loadConcepts()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      <span>刷新</span>
    </button>
    <button class="btn btn-primary" type="button" onclick="openCreate()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
      <span>新增</span>
    </button>
  </div>
</header>

<div class="workspace">
  <aside class="concept-rail">
    <div class="rail-top">
      <div class="metrics">
        <div class="metric"><div class="metric-value" id="statTotal">-</div><div class="metric-label">概念</div></div>
        <div class="metric"><div class="metric-value" id="statQuotes">-</div><div class="metric-label">摘录</div></div>
      </div>
      <label class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="搜索概念、英文名或 ID" oninput="handleSearch()">
      </label>
    </div>
    <div class="rail-label">
      <span>Concepts</span>
      <span id="filteredCount">0</span>
    </div>
    <div class="rail-list" id="conceptList"></div>
  </aside>

  <main class="editor" id="editPanel">
    <div class="editor-shell">
      <div class="empty-editor" id="editEmpty">
        <div class="empty-card">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          <h1>选择一个概念开始编辑</h1>
          <p>Core concept editor</p>
        </div>
      </div>

      <form class="edit-form" id="editForm" onsubmit="event.preventDefault();">
        <div class="editor-head">
          <div>
            <div class="eyebrow" id="editModeLabel">Concept Detail</div>
            <h1 class="edit-title" id="editTitle">编辑概念</h1>
          </div>
          <div class="edit-actions">
            <span class="autosave-status" id="autosaveStatus"></span>
            <button class="btn btn-sm btn-danger" type="button" onclick="confirmDelete()" id="deleteBtn">删除</button>
          </div>
        </div>

        <input type="hidden" id="formId">
        <section class="panel">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="formNameZh">中文名称 <span class="required">*</span></label>
              <input type="text" class="form-input" id="formNameZh" autocomplete="off">
            </div>
            <div class="form-group">
              <label class="form-label" for="formNameEn">英文名称 <span class="required">*</span></label>
              <input type="text" class="form-input" id="formNameEn" autocomplete="off">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="formCategory">分类</label>
            <select class="form-select" id="formCategory">
              <option value="">选择分类</option>
              <option>核心概念</option><option>实相与创造</option><option>意识与感知</option><option>多维自我与身份</option>
              <option>时间与空间</option><option>梦境与睡眠</option><option>身体与健康</option>
              <option>情感与能量</option><option>社会与群体</option><option>进化与价值</option>
              <option>创造与自发性</option><option>宗教与神话</option><option>科学与知识</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="formExplanation">阐释</label>
            <textarea class="form-textarea text-short" id="formExplanation"></textarea>
          </div>
        </section>

        <section>
          <div class="section-head">
            <h2 class="section-title">定义条目 (<span id="defCountDisplay">0</span>)</h2>
            <div class="section-tools">
              <button type="button" class="btn btn-sm" onclick="addDefinition()">添加</button>
            </div>
          </div>
          <div class="definition-list" id="definitionList"></div>
        </section>

        <section class="panel">
          <div class="form-group">
            <label class="form-label" for="formDefinition">定义（中文）</label>
            <textarea class="form-textarea" id="formDefinition"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="formDefinitionEn">英文定义</label>
            <textarea class="form-textarea text-tall" id="formDefinitionEn"></textarea>
          </div>
        </section>

        <section>
          <div class="section-head">
            <h2 class="section-title">摘录 (<span id="quoteCountDisplay">0</span>)</h2>
            <div class="section-tools">
              <button type="button" class="btn btn-sm" onclick="addQuote()">添加</button>
            </div>
          </div>
          <div class="quote-list" id="quotesList"></div>
        </section>
      </form>
    </div>
  </main>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p class="confirm-text" id="confirmText"></p>
    <div class="confirm-warning">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      <span>此操作不可撤销</span>
    </div>
    <div class="confirm-actions">
      <button class="btn" type="button" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" type="button" id="confirmDeleteBtn" onclick="doDelete()">确认删除</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let concepts = [];
let editingQuotes = [];
let editingDefinition = [];
let currentDefinitionSource = '';
let currentId = null;
let deleteTarget = null;
let isDeleting = false;
let quoteMetadataSaveTimers = {};
let conceptAutosaveTimer = null;
let isHydratingForm = false;
const API_BASE = window.location.origin;

document.addEventListener('DOMContentLoaded', function() {
  loadConcepts();
  bindQuoteEditorEvents();
  bindConceptEditorEvents();
});

async function loadConcepts() {
  try {
    var response = await fetch(API_BASE + '/api/concepts');
    if (!response.ok) throw new Error('加载失败');
    var data = await response.json();
    concepts = data.concepts || [];
    document.getElementById('statTotal').textContent = data.total || concepts.length || 0;
    var totalQ = 0;
    for (var i = 0; i < concepts.length; i++) totalQ += concepts[i].quotes_count || 0;
    document.getElementById('statQuotes').textContent = totalQ;
    renderList();
  } catch (error) {
    showToast('加载失败: ' + error.message, 'error');
  }
}

function getFilteredConcepts() {
  var searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
  var filtered = concepts.slice();
  if (searchTerm) {
    filtered = filtered.filter(function(c) {
      return (c.id || '').toLowerCase().indexOf(searchTerm) !== -1 ||
        (c.name_zh || '').toLowerCase().indexOf(searchTerm) !== -1 ||
        (c.name_en || '').toLowerCase().indexOf(searchTerm) !== -1;
    });
  }
  return filtered;
}

function renderList() {
  var container = document.getElementById('conceptList');
  var filtered = getFilteredConcepts();
  document.getElementById('filteredCount').textContent = filtered.length;
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-inline">无匹配概念</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    var isActive = c.id === currentId;
    html += '<button type="button" class="concept-item' + (isActive ? ' active' : '') + '" data-id="' + escapeAttr(c.id) + '" onclick="selectConcept(\'' + escapeJs(c.id) + '\')">';
    html += '<span class="concept-dot"></span>';
    html += '<span class="concept-text"><span class="concept-name">' + escapeHtml(c.name_zh) + '</span><span class="concept-en">' + escapeHtml(c.name_en || c.id || '') + '</span></span>';
    html += '<span class="concept-count">' + (c.quotes_count || 0) + '</span>';
    html += '</button>';
  }
  container.innerHTML = html;
}

function handleSearch() {
  renderList();
}

async function selectConcept(id) {
  clearQuoteMetadataSaveTimers();
  clearConceptAutosaveTimer();
  currentId = id;
  renderList();
  try {
    var response = await fetch(API_BASE + '/api/concepts/' + encodeURIComponent(id));
    if (!response.ok) throw new Error('加载失败');
    var c = await response.json();
    isHydratingForm = true;
    document.getElementById('editEmpty').style.display = 'none';
    document.getElementById('editForm').style.display = 'block';
    document.getElementById('editModeLabel').textContent = c.id || 'Concept Detail';
    document.getElementById('editTitle').textContent = c.name_zh || '未命名概念';
    document.getElementById('deleteBtn').style.display = 'inline-flex';
    document.getElementById('formId').value = c.id || '';
    document.getElementById('formNameZh').value = c.name_zh || '';
    document.getElementById('formNameEn').value = c.name_en || '';
    document.getElementById('formCategory').value = c.category || '';
    editingDefinition = [];
    if (Array.isArray(c.definition)) {
      editingDefinition = c.definition.slice();
      document.getElementById('formDefinition').value = '';
      document.getElementById('formDefinitionEn').value = '';
    } else {
      document.getElementById('formDefinition').value = c.definition || '';
      document.getElementById('formDefinitionEn').value = c.definition_en || '';
    }
    currentDefinitionSource = c.definition_source || '';
    document.getElementById('formExplanation').value = c.explanation || '';
    editingQuotes = (c.quotes || []).map(function(q) {
      return {
        id: q.id || '',
        text: q.text || '',
        translation: q.translation || '',
        source: q.source || '',
        book: q.book || '',
        source_file: q.source_file || '',
        type: q.type || 'seth',
        score: q.score,
        match_count: q.match_count,
        prefix_match: q.prefix_match,
        semantic_reason: q.semantic_reason,
        quote_role: q.quote_role || '',
        semantic_score: q.semantic_score === undefined || q.semantic_score === null ? '' : q.semantic_score,
        reading_order: q.reading_order === undefined || q.reading_order === null ? '' : q.reading_order,
        related_concepts: q.related_concepts || []
      };
    });
    document.getElementById('quoteCountDisplay').textContent = editingQuotes.length;
    renderDefinitionList();
    renderQuoteList();
    setAutosaveStatus('', '');
  } catch (error) {
    showToast('加载概念详情失败: ' + error.message, 'error');
  } finally {
    isHydratingForm = false;
  }
}

function openCreate() {
  clearQuoteMetadataSaveTimers();
  clearConceptAutosaveTimer();
  currentId = null;
  isHydratingForm = true;
  renderList();
  document.getElementById('editEmpty').style.display = 'none';
  document.getElementById('editForm').style.display = 'block';
  document.getElementById('editModeLabel').textContent = 'New Concept';
  document.getElementById('editTitle').textContent = '新增概念';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('formId').value = '';
  document.getElementById('formNameZh').value = '';
  document.getElementById('formNameEn').value = '';
  document.getElementById('formCategory').value = '核心概念';
  document.getElementById('formDefinition').value = '';
  document.getElementById('formDefinitionEn').value = '';
  currentDefinitionSource = '';
  document.getElementById('formExplanation').value = '';
  editingDefinition = [];
  editingQuotes = [];
  document.getElementById('quoteCountDisplay').textContent = '0';
  renderDefinitionList();
  renderQuoteList();
  setAutosaveStatus('', '');
  isHydratingForm = false;
  document.getElementById('formNameZh').focus();
}

function renderDefinitionList() {
  var list = document.getElementById('definitionList');
  document.getElementById('defCountDisplay').textContent = editingDefinition.length;
  if (editingDefinition.length === 0) {
    list.innerHTML = '<div class="empty-inline">暂无定义条目</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < editingDefinition.length; i++) {
    var d = editingDefinition[i] || {};
    html += '<article class="definition-item">';
    html += '<div class="item-head"><span class="item-title">定义 #' + (i + 1) + '</span>';
    html += '<button type="button" class="btn btn-sm btn-danger btn-icon" aria-label="删除定义" onclick="removeDefinition(' + i + ')">&times;</button></div>';
    html += '<div class="flat-pair">';
    html += '<div class="flat-editor definition-zh" contenteditable="true" data-placeholder="中文定义" data-definition-index="' + i + '" data-definition-field="zh">' + escapeHtml(d.zh || '') + '</div>';
    html += '<div class="flat-editor definition-en" contenteditable="true" data-placeholder="English definition" data-definition-index="' + i + '" data-definition-field="en">' + escapeHtml(d.en || '') + '</div>';
    html += '</div>';
    html += '</article>';
  }
  list.innerHTML = html;
}

function addDefinition() {
  editingDefinition.push({ en: '', zh: '', source: '' });
  renderDefinitionList();
  scheduleConceptAutosave();
}

function removeDefinition(idx) {
  editingDefinition.splice(idx, 1);
  renderDefinitionList();
  scheduleConceptAutosave();
}

function renderQuoteList() {
  var list = document.getElementById('quotesList');
  if (editingQuotes.length === 0) {
    list.innerHTML = '<div class="empty-inline">暂无摘录</div>';
    return;
  }
  document.getElementById('quoteCountDisplay').textContent = editingQuotes.length;
  var html = '';
  for (var i = 0; i < editingQuotes.length; i++) {
    var q = editingQuotes[i] || {};
    html += '<article class="quote-item">';
    html += '<div class="item-head"><span class="item-title">摘录 #' + (i + 1) + '</span>';
    html += '<button type="button" class="btn btn-sm btn-danger btn-icon" aria-label="删除摘录" onclick="confirmQuoteDelete(' + i + ')">&times;</button></div>';
    html += '<div class="flat-pair">';
    html += '<div class="flat-editor quote-zh" contenteditable="true" data-placeholder="点击编辑" data-quote-index="' + i + '" data-quote-field="translation">' + escapeHtml(q.translation || '') + '</div>';
    html += '<div class="flat-editor quote-en" contenteditable="true" data-placeholder="Click to edit" data-quote-index="' + i + '" data-quote-field="text">' + escapeHtml(q.text || '') + '</div>';
    html += '</div>';
    html += '<div class="quote-meta-grid">';
    html += '<label class="quote-meta-field"><span class="quote-meta-label">分类</span><select class="quote-meta-input" data-quote-index="' + i + '" data-quote-field="quote_role">' + renderQuoteRoleOptions(q.quote_role || '') + '</select></label>';
    html += '<label class="quote-meta-field"><span class="quote-meta-label">语义评分</span><input class="quote-meta-input" type="number" step="1" value="' + escapeAttr(q.semantic_score === undefined || q.semantic_score === null ? '' : q.semantic_score) + '" data-quote-index="' + i + '" data-quote-field="semantic_score"></label>';
    html += '<label class="quote-meta-field"><span class="quote-meta-label">分类顺序</span><input class="quote-meta-input" type="number" step="1" value="' + escapeAttr(q.reading_order === undefined || q.reading_order === null ? '' : q.reading_order) + '" data-quote-index="' + i + '" data-quote-field="reading_order"></label>';
    html += '<div class="quote-save-status" data-quote-save-status="' + i + '"></div>';
    html += '</div>';
    html += '</article>';
  }
  list.innerHTML = html;
}

function renderQuoteRoleOptions(value) {
  var roles = [
    ['', '未分类'],
    ['definition', '定义'],
    ['description', '阐述/描述'],
    ['mechanism', '机制'],
    ['example', '例子'],
    ['practice', '实践/方法'],
    ['warning', '警告/提醒'],
    ['uncategorized', '未分类']
  ];
  return roles.map(function(role) {
    return '<option value="' + escapeAttr(role[0]) + '"' + (role[0] === value ? ' selected' : '') + '>' + escapeHtml(role[1]) + '</option>';
  }).join('');
}

function bindQuoteEditorEvents() {
  var list = document.getElementById('quotesList');
  list.addEventListener('input', handleQuoteFieldEvent);
  list.addEventListener('change', handleQuoteFieldEvent);
}

function bindConceptEditorEvents() {
  var form = document.getElementById('editForm');
  form.addEventListener('input', handleConceptFieldEvent);
  form.addEventListener('change', handleConceptFieldEvent);
}

function handleConceptFieldEvent(e) {
  if (isHydratingForm) return;
  var quoteEl = e.target.closest('[data-quote-index][data-quote-field]');
  if (quoteEl) {
    var quoteField = quoteEl.dataset.quoteField;
    if (quoteField === 'translation' || quoteField === 'text') {
      scheduleConceptAutosave();
    }
    return;
  }
  var defEl = e.target.closest('[data-definition-index][data-definition-field]');
  if (defEl) {
    var idx = Number(defEl.dataset.definitionIndex);
    var field = defEl.dataset.definitionField;
    if (Number.isInteger(idx) && editingDefinition[idx]) {
      editingDefinition[idx][field] = getEditableText(defEl);
      scheduleConceptAutosave();
    }
    return;
  }
  if (['formNameZh', 'formNameEn', 'formCategory', 'formExplanation', 'formDefinition', 'formDefinitionEn'].indexOf(e.target.id) !== -1) {
    scheduleConceptAutosave();
  }
}

function handleQuoteFieldEvent(e) {
  var el = e.target.closest('[data-quote-index][data-quote-field]');
  if (!el) return;
  var idx = Number(el.dataset.quoteIndex);
  var field = el.dataset.quoteField;
  if (!Number.isInteger(idx) || !editingQuotes[idx]) return;
  if (field === 'semantic_score' || field === 'reading_order') {
    editingQuotes[idx][field] = parseOptionalNumber(el.value);
    scheduleQuoteMetadataSave(idx);
  } else if (field === 'translation' || field === 'text') {
    editingQuotes[idx][field] = getEditableText(el);
  } else if (field === 'quote_role') {
    editingQuotes[idx][field] = el.value;
    scheduleQuoteMetadataSave(idx);
  }
}

function scheduleQuoteMetadataSave(idx) {
  if (!currentId || !editingQuotes[idx]) return;
  clearTimeout(quoteMetadataSaveTimers[idx]);
  setQuoteSaveStatus(idx, 'saving', '保存中');
  quoteMetadataSaveTimers[idx] = setTimeout(function() {
    saveQuoteMetadata(idx);
  }, 450);
}

async function saveQuoteMetadata(idx) {
  var quote = editingQuotes[idx];
  if (!currentId || !quote) return;
  try {
    var response = await fetch(API_BASE + '/api/concepts/' + encodeURIComponent(currentId) + '/quotes/' + idx + '/metadata', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        quote_role: quote.quote_role || '',
        semantic_score: parseOptionalNumber(quote.semantic_score),
        reading_order: parseOptionalNumber(quote.reading_order)
      })
    });
    if (!response.ok) {
      var error = await response.json();
      throw new Error(error.error || '保存失败');
    }
    setQuoteSaveStatus(idx, 'saved', '已保存');
  } catch (error) {
    setQuoteSaveStatus(idx, 'error', '保存失败');
    showToast('摘录 #' + (idx + 1) + ' 元数据保存失败: ' + error.message, 'error');
  }
}

function setQuoteSaveStatus(idx, state, text) {
  var el = document.querySelector('[data-quote-save-status="' + idx + '"]');
  if (!el) return;
  el.className = 'quote-save-status ' + (state || '');
  el.textContent = text || '';
  if (state === 'saved') {
    setTimeout(function() {
      if (el.classList.contains('saved')) el.textContent = '';
    }, 1800);
  }
}

function clearQuoteMetadataSaveTimers() {
  Object.keys(quoteMetadataSaveTimers).forEach(function(key) {
    clearTimeout(quoteMetadataSaveTimers[key]);
  });
  quoteMetadataSaveTimers = {};
}

function addQuote() {
  editingQuotes.push({ text: '', translation: '', source: '', type: 'seth', quote_role: '', semantic_score: '', reading_order: '' });
  document.getElementById('quoteCountDisplay').textContent = editingQuotes.length;
  renderQuoteList();
  scheduleConceptAutosave();
}

function confirmQuoteDelete(idx) {
  var quote = editingQuotes[idx];
  if (!quote) return;
  deleteTarget = { type: 'quote', index: idx };
  var preview = (quote.translation || quote.text || '').trim();
  if (preview.length > 48) preview = preview.slice(0, 48) + '...';
  document.getElementById('confirmText').textContent = '确定要删除摘录 #' + (idx + 1) + (preview ? '「' + preview + '」' : '') + '吗？';
  openConfirmDialog();
}

function removeQuote(idx) {
  clearTimeout(quoteMetadataSaveTimers[idx]);
  delete quoteMetadataSaveTimers[idx];
  editingQuotes.splice(idx, 1);
  document.getElementById('quoteCountDisplay').textContent = editingQuotes.length;
  renderQuoteList();
}

function scheduleConceptAutosave() {
  if (isHydratingForm) return;
  clearTimeout(conceptAutosaveTimer);
  setAutosaveStatus('saving', '待保存');
  conceptAutosaveTimer = setTimeout(function() {
    saveConcept();
  }, 800);
}

function clearConceptAutosaveTimer() {
  clearTimeout(conceptAutosaveTimer);
  conceptAutosaveTimer = null;
}

async function saveConcept() {
  var formId = document.getElementById('formId').value;
  var nameZh = document.getElementById('formNameZh').value.trim();
  var nameEn = document.getElementById('formNameEn').value.trim();
  var definitionText = document.getElementById('formDefinition').value.trim();
  var cleanDefinitions = editingDefinition.filter(function(d) {
    return (d.zh || '').trim() || (d.en || '').trim() || (d.source || '').trim();
  });
  if (!nameZh || !nameEn || (!definitionText && cleanDefinitions.length === 0)) {
    setAutosaveStatus('error', '待补全');
    return;
  }
  setAutosaveStatus('saving', '保存中');
  var concept = {
    name_zh: nameZh,
    name_en: nameEn,
    category: document.getElementById('formCategory').value.trim() || '核心概念',
    definition: cleanDefinitions.length > 0 ? cleanDefinitions : definitionText,
    definition_en: cleanDefinitions.length > 0 ? '' : document.getElementById('formDefinitionEn').value.trim(),
    definition_source: currentDefinitionSource,
    explanation: document.getElementById('formExplanation').value.trim(),
    quotes: editingQuotes.filter(function(q) { return (q.text || '').trim(); }).map(normalizeQuoteForSave)
  };
  try {
    var response;
    if (formId) {
      response = await fetch(API_BASE + '/api/concepts/' + encodeURIComponent(formId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(concept)
      });
      concept.id = formId;
    } else {
      concept.id = nameEn.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') || 'concept-new';
      response = await fetch(API_BASE + '/api/concepts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(concept)
      });
    }
    if (!response.ok) {
      var error = await response.json();
      throw new Error(error.error || '保存失败');
    }
    setAutosaveStatus('saved', '已保存');
    currentId = concept.id;
    document.getElementById('formId').value = concept.id;
    document.getElementById('editModeLabel').textContent = concept.id;
    document.getElementById('deleteBtn').style.display = 'inline-flex';
    await loadConcepts();
  } catch (error) {
    setAutosaveStatus('error', '保存失败');
    showToast(error.message, 'error');
  }
}

function setAutosaveStatus(state, text) {
  var el = document.getElementById('autosaveStatus');
  if (!el) return;
  el.className = 'autosave-status ' + (state || '');
  el.textContent = text || '';
  if (state === 'saved') {
    setTimeout(function() {
      if (el.classList.contains('saved')) el.textContent = '';
    }, 1800);
  }
}

function confirmDelete() {
  if (!currentId) return;
  deleteTarget = { type: 'concept', id: currentId };
  var item = concepts.find(function(c) { return c.id === currentId; });
  document.getElementById('confirmText').textContent = '确定要删除概念「' + (item ? item.name_zh : currentId) + '」吗？';
  openConfirmDialog();
}

function openConfirmDialog() {
  isDeleting = false;
  document.getElementById('confirmOverlay').classList.add('active');
  var btn = document.getElementById('confirmDeleteBtn');
  if (btn) btn.disabled = false;
  requestAnimationFrame(function() {
    var focusedBtn = document.getElementById('confirmDeleteBtn');
    if (focusedBtn) focusedBtn.focus();
  });
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
  var btn = document.getElementById('confirmDeleteBtn');
  if (btn) btn.disabled = false;
  isDeleting = false;
  deleteTarget = null;
}

async function doDelete() {
  if (!deleteTarget || isDeleting) return;
  isDeleting = true;
  var btn = document.getElementById('confirmDeleteBtn');
  if (btn) btn.disabled = true;
  if (deleteTarget.type === 'quote') {
    await doDeleteQuote(deleteTarget.index);
    return;
  }
  if (deleteTarget.type !== 'concept') {
    isDeleting = false;
    if (btn) btn.disabled = false;
    return;
  }
  try {
    var response = await fetch(API_BASE + '/api/concepts/' + encodeURIComponent(deleteTarget.id), { method: 'DELETE' });
    if (!response.ok) {
      var error = await response.json();
      throw new Error(error.error || '删除失败');
    }
    showToast('概念已删除', 'success');
    closeConfirm();
    currentId = null;
    document.getElementById('editEmpty').style.display = 'grid';
    document.getElementById('editForm').style.display = 'none';
    loadConcepts();
  } catch (error) {
    isDeleting = false;
    if (btn) btn.disabled = false;
    showToast(error.message, 'error');
  }
}

async function doDeleteQuote(idx) {
  var quote = editingQuotes[idx];
  if (!quote) {
    closeConfirm();
    return;
  }
  try {
    if (currentId && quote.id) {
      var response = await fetch(API_BASE + '/api/concepts/' + encodeURIComponent(currentId) + '/quotes/' + encodeURIComponent(quote.id), { method: 'DELETE' });
      if (!response.ok) {
        var error = await response.json();
        throw new Error(error.error || '删除失败');
      }
    }
    removeQuote(idx);
    if (!quote.id) scheduleConceptAutosave();
    showToast('摘录已删除', 'success');
    closeConfirm();
    loadConcepts();
  } catch (error) {
    isDeleting = false;
    var btn = document.getElementById('confirmDeleteBtn');
    if (btn) btn.disabled = false;
    showToast('摘录删除失败: ' + error.message, 'error');
  }
}

document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

document.addEventListener('keydown', function(e) {
  var overlay = document.getElementById('confirmOverlay');
  if (!overlay || !overlay.classList.contains('active')) return;
  if (e.key === 'Enter') {
    e.preventDefault();
    doDelete();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    closeConfirm();
  }
});

function showToast(message, type) {
  type = type || 'success';
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<span class="toast-icon"></span><span class="toast-message">' + escapeHtml(message) + '</span>';
  container.appendChild(toast);
  requestAnimationFrame(function() { toast.classList.add('show'); });
  setTimeout(function() {
    toast.classList.remove('show');
    setTimeout(function() { toast.remove(); }, 300);
  }, 3000);
}

function getEditableText(el) {
  return (el.innerText || '').replace(/\n$/, '');
}

function parseOptionalNumber(value) {
  if (value === '') return '';
  var num = Number(value);
  return Number.isFinite(num) ? num : '';
}

function normalizeQuoteForSave(q) {
  var quote = Object.assign({}, q);
  quote.quote_role = quote.quote_role || '';
  quote.semantic_score = parseOptionalNumber(quote.semantic_score);
  quote.reading_order = parseOptionalNumber(quote.reading_order);
  return quote;
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  var div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function escapeAttr(str) {
  return escapeHtml(str).replace(/'/g, '&#39;');
}

function escapeJs(str) {
  return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
</script>
