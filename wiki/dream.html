<!DOCTYPE html>
<html lang="zh-CN" data-activeWorld="dream-world">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦宇宙 - 赛斯宇宙</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"></noscript>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#050508;
  --bg-surface:#0c0c12;
  --bg-elevated:#141420;
  --bg-card:#101018;
  --bg-card-hover:#181824;
  --border-subtle:rgba(255,255,255,0.04);
  --border-active:rgba(90,138,176,0.3);
  --dream:#5a8ab0;
  --dream-bright:#7aacc8;
  --dream-dim:#3a6a8a;
  --dream-glow:rgba(90,138,176,0.08);
  --dream-glow2:rgba(90,138,176,0.04);
  --star:#e8e0d0;
  --text-primary:#e0dcd0;
  --text-secondary:#a09880;
  --text-muted:#4a4538;
  --accent-ethereal:#6b8fa3;
  --accent-mystic:#8b6ba3;
  --accent-life:#6ba37a;
  --accent-warm:#a37a5a;
  --font-serif:'EB Garamond',serif;
  --font-display:'Instrument Serif','EB Garamond',serif;
  --font-zh-title:'Noto Serif SC',serif;
  --font-zh-body:'Noto Sans SC',sans-serif;
  --prism-expanded-w:260px;
  --prism-collapsed-w:56px;
  --header-h:52px;
}

html{scroll-behavior:smooth;font-size:14px}
body{
  background:var(--bg-deep);
  color:var(--text-primary);
  font-family:var(--font-zh-body);
  line-height:1.7;
  overflow-x:hidden;
  min-height:100vh;
}

/* Deep night sky background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.5;
  background-image:
    radial-gradient(1.2px 1.2px at 8% 15%,rgba(180,200,220,0.5),transparent),
    radial-gradient(1px 1px at 22% 35%,rgba(180,200,220,0.3),transparent),
    radial-gradient(1.5px 1.5px at 38% 8%,rgba(200,210,230,0.6),transparent),
    radial-gradient(1px 1px at 52% 60%,rgba(180,200,220,0.3),transparent),
    radial-gradient(1px 1px at 68% 25%,rgba(180,200,220,0.4),transparent),
    radial-gradient(1.3px 1.3px at 82% 45%,rgba(200,210,230,0.5),transparent),
    radial-gradient(1px 1px at 12% 75%,rgba(180,200,220,0.3),transparent),
    radial-gradient(1px 1px at 28% 55%,rgba(180,200,220,0.2),transparent),
    radial-gradient(1.4px 1.4px at 45% 80%,rgba(200,210,230,0.4),transparent),
    radial-gradient(1px 1px at 72% 5%,rgba(180,200,220,0.3),transparent),
    radial-gradient(1px 1px at 88% 70%,rgba(180,200,220,0.2),transparent),
    radial-gradient(1px 1px at 5% 50%,rgba(180,200,220,0.3),transparent);
}

body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.015;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(90,138,176,0.12);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(90,138,176,0.25)}

/* HEADER */
.header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:rgba(5,5,8,0.85);
  backdrop-filter:blur(20px) saturate(1.1);
  border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;
}
.header-logo{display:flex;align-items:center;gap:12px}
.header-logo .logo-mark{
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:14px;color:var(--dream);font-style:italic;opacity:0.8;
}
.header-logo a{
  text-decoration:none;color:var(--text-primary);
  font-family:var(--font-zh-title);font-size:14px;font-weight:600;letter-spacing:0.08em;
}
.header-tagline{
  font-family:var(--font-serif);font-size:14px;
  color:var(--text-muted);font-style:italic;letter-spacing:0.08em;
  display:none;
}
@media(min-width:900px){.header-tagline{display:block}}
.header-actions{display:flex;align-items:center;gap:12px}
.menu-toggle{
  display:none;background:none;border:none;
  color:var(--text-primary);cursor:pointer;padding:4px;
}
.menu-toggle svg{width:20px;height:20px}

/* PRISM NAV */
#prism-nav{
  position:fixed;top:var(--header-h);left:0;bottom:0;
  width:var(--prism-expanded-w);
  background:var(--bg-surface);
  border-right:1px solid var(--border-subtle);
  z-index:55;display:flex;flex-direction:column;padding:0;
  transition:width 0.3s cubic-bezier(0.4,0,0.2,1);overflow:visible;
}
#prism-nav.pn-collapsed{width:var(--prism-collapsed-w)}
.pn-inner{
  flex:1;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;padding:20px 0 12px;
}
.pn-inner::-webkit-scrollbar{width:3px}
.pn-inner::-webkit-scrollbar-thumb{background:rgba(90,138,176,0.15);border-radius:2px}
.pn-nodes{display:flex;flex-direction:column;gap:4px;padding:0 8px;flex:1}
.pn-node{border-radius:8px;overflow:hidden;transition:background 0.2s}
.pn-node.pn-node-expanded{background:rgba(255,255,255,0.015)}
.pn-node-trigger{
  display:flex;align-items:center;gap:10px;padding:10px 8px;
  text-decoration:none;color:var(--text-secondary);
  transition:all 0.2s;position:relative;border-radius:8px;
}
.pn-node-trigger:hover{background:rgba(255,255,255,0.02);color:var(--text-primary)}
.pn-node-icon{
  width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.pn-node-icon svg{width:100%;height:100%}
.pn-node-trigger:hover .pn-node-icon{transform:scale(1.1)}
.pn-node-label{
  font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:opacity 0.15s;
}
.pn-node-label-en{
  font-family:var(--font-serif);font-size:14px;color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity 0.15s;
}
.pn-collapsed .pn-node-label,.pn-collapsed .pn-node-label-en{
  opacity:0;pointer-events:none;position:absolute;width:1px;height:1px;overflow:hidden;
}
.pn-node-active>.pn-node-trigger{color:var(--text-primary);font-weight:600}
.pn-node-glow{
  position:absolute;left:0;top:10%;bottom:10%;width:2.5px;
  background:linear-gradient(180deg,transparent,var(--dream),transparent);
  border-radius:0 1.5px 1.5px 0;
}
.pn-collapsed .pn-node-glow{left:-1px}
.pn-node-subs{
  max-height:0;overflow:hidden;
  transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1),opacity 0.2s;
  opacity:0;padding:0 6px 0 34px;
}
.pn-node-expanded .pn-node-subs{max-height:600px;opacity:1;padding:2px 6px 8px 34px}
.pn-collapsed .pn-node-subs{max-height:0!important;opacity:0!important;padding:0!important}
.pn-sub{
  display:flex;align-items:flex-start;gap:6px;padding:5px 3px;
  text-decoration:none;transition:all 0.12s;border-radius:5px;
}
.pn-sub:hover{background:rgba(255,255,255,0.02)}
.pn-sub-dot{width:3.5px;height:3.5px;border-radius:50%;background:var(--text-muted);margin-top:5.5px;flex-shrink:0;transition:all 0.15s}
.pn-sub:hover .pn-sub-dot{background:var(--dream)}
.pn-sub-text{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.pn-sub-label{font-size:16px;color:var(--text-secondary);transition:color 0.12s}
.pn-sub:hover .pn-sub-label{color:var(--text-primary)}
.pn-sub-desc{font-family:var(--font-serif);font-size:14px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pn-toggle{
  position:absolute;top:50%;right:-11px;transform:translateY(-50%);
  width:22px;height:48px;background:var(--bg-elevated);
  border:1px solid var(--border-subtle);border-radius:0 6px 6px 0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);font-size:14px;transition:all 0.2s;z-index:56;
}
.pn-toggle:hover{background:var(--bg-card-hover);color:var(--dream);border-color:var(--border-active)}

/* MAIN - Full width for dream page */
.main{
  margin-left:var(--prism-w);
  margin-top:var(--header-h);
  min-height:calc(100vh - var(--header-h));
  transition:margin-left 0.3s cubic-bezier(0.4,0,0.2,1);
}

/* Dream Hero */
.dream-hero{
  position:relative;
  min-height:calc(100vh - var(--header-h));
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  padding:60px 40px;
  overflow:hidden;
}
.dream-hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 600px 400px at 30% 40%,rgba(90,138,176,0.06),transparent),
    radial-gradient(ellipse 500px 300px at 70% 60%,rgba(139,107,163,0.04),transparent);
}
.dream-hero-content{
  position:relative;z-index:1;max-width:640px;
}
.dream-hero .ornament{
  display:flex;align-items:center;gap:20px;margin-bottom:36px;
}
.dream-hero .ornament .line{flex:1;height:0.5px;background:linear-gradient(90deg,transparent,var(--dream-dim),transparent)}
.dream-hero .ornament .crescent{
  width:20px;height:20px;flex-shrink:0;color:var(--dream);
}
.dream-hero .moon-icon{
  width:48px;height:48px;margin:0 auto 28px;color:var(--dream);opacity:0.7;
}
.dream-hero .eyebrow{
  font-family:var(--font-serif);font-size:14px;
  text-transform:uppercase;letter-spacing:0.3em;
  color:var(--dream);margin-bottom:20px;
  opacity:0;animation:fadeUp 0.6s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
}
.dream-hero h1{
  font-family:var(--font-zh-title);font-size:clamp(36px,6vw,56px);
  font-weight:300;line-height:1.2;color:var(--star);
  margin-bottom:8px;
  opacity:0;animation:fadeUp 0.6s 0.15s cubic-bezier(0.16,1,0.3,1) forwards;
}
.dream-hero .subtitle-en{
  font-family:var(--font-display);font-size:clamp(16px,2.5vw,22px);
  color:var(--text-muted);font-style:italic;margin-bottom:32px;
  opacity:0;animation:fadeUp 0.6s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
}
.dream-hero .desc{
  font-size:16px;color:var(--text-secondary);line-height:2;
  max-width:480px;margin:0 auto 48px;
  opacity:0;animation:fadeUp 0.6s 0.25s cubic-bezier(0.16,1,0.3,1) forwards;
}

/* Dream Cards */
.dream-cards{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;max-width:560px;margin:0 auto;
  opacity:0;animation:fadeUp 0.6s 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
}
.dream-card{
  background:var(--bg-card);
  border:0.5px solid var(--border-subtle);
  border-radius:4px;padding:24px 20px;
  text-decoration:none;color:var(--text-primary);
  transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.dream-card:hover{
  border-color:var(--border-active);
  background:var(--bg-card-hover);
  transform:translateY(-2px);
}
.dream-card .dc-icon{
  width:28px;height:28px;color:var(--dream);opacity:0.6;
  transition:opacity 0.2s,transform 0.2s;
}
.dream-card:hover .dc-icon{opacity:1;transform:scale(1.1)}
.dream-card h3{
  font-family:var(--font-zh-title);font-size:16px;font-weight:600;
}
.dream-card .dc-en{
  font-family:var(--font-serif);font-size:12px;color:var(--text-muted);
  font-style:italic;
}
.dream-card p{
  font-size:14px;color:var(--text-muted);line-height:1.6;text-align:center;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Responsive */
@media(max-width:768px){
  #prism-nav{display:none}
  .main{margin-left:0}
  .dream-hero{padding:40px 20px}
  .dream-hero h1{font-size:32px}
  .dream-cards{grid-template-columns:1fr;max-width:280px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <button class="menu-toggle" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="logo-mark">S</div>
    <a href="index.html">赛斯宇宙</a>
  </div>
  <div class="header-tagline">Dreams &amp; the Nature of Reality</div>
  <div class="header-actions"></div>
</header>

<main class="main">
  <div class="dream-hero">
    <div class="dream-hero-content">
      <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <div class="ornament"><div class="line"></div><div class="crescent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></div><div class="line"></div></div>
      <div class="eyebrow">The Dream Universe</div>
      <h1>梦宇宙</h1>
      <div class="subtitle-en">Dreams &amp; the Nature of Reality</div>
      <p class="desc">梦境不是幻象，而是你真正生活的另一个维度。在梦中，你穿越时空、创造世界、与其他意识相遇——这是赛斯教义中最深奥也最实用的领域。</p>
      <div class="dream-cards">
        <a class="dream-card" href="#">
          <svg class="dc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <h3>梦境地图</h3>
          <div class="dc-en">Dream Landscape</div>
          <p>探索梦境实相的多维结构</p>
        </a>
        <a class="dream-card" href="#">
          <svg class="dc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <h3>梦练习</h3>
          <div class="dc-en">Dream Exercises</div>
          <p>赛斯梦境实践指南</p>
        </a>
        <a class="dream-card" href="#">
          <svg class="dc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          <h3>梦概念</h3>
          <div class="dc-en">Dream Concepts</div>
          <p>梦境相关的核心概念</p>
        </a>
      </div>
    </div>
  </div>
</main>

<script src="global-menu.js"></script>
</body>
</html>
