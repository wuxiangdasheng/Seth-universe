<!DOCTYPE html>
<html lang="zh-CN" data-activeWorld="concept-world">
<head>
<meta charset="UTF-8">
<script>
if ('scrollRestoration' in history) {
  history.scrollRestoration = 'manual';
}
window.scrollTo(0, 0);
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛斯(Seth)宇宙</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"></noscript>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#050508;
  --bg-surface:#0c0c12;
  --bg-elevated:#141420;
  --bg-card:#101018;
  --bg-card-hover:#181824;
  --border-subtle:rgba(255,255,255,0.04);
  --border-active:rgba(180,160,100,0.3);
  --gold:#b4a064;
  --gold-bright:#d4c088;
  --gold-dim:#8a7a52;
  --gold-glow:rgba(180,160,100,0.08);
  --gold-glow2:rgba(180,160,100,0.04);
  --star:#e8e0d0;
  --text-primary:#e0dcd0;
  --text-secondary:#a09880;
  --text-muted:#4a4538;
  --accent-ethereal:#6b8fa3;
  --accent-mystic:#8b6ba3;
  --accent-life:#6ba37a;
  --accent-warm:#a37a5a;
  --accent-rose:#a35a7a;
  --font-serif:'EB Garamond',serif;
  --font-display:'Instrument Serif','EB Garamond',serif;
  --font-zh-title:'Noto Serif SC',serif;
  --font-zh-body:'Noto Sans SC',sans-serif;
  --prism-expanded-w:260px;
  --prism-collapsed-w:56px;
  --sidebar-w:280px;
  --header-h:52px;
}

html{scroll-behavior:auto;font-size:16px}
body{
  background:var(--bg-deep);
  color:var(--text-primary);
  font-family:var(--font-zh-body);
  line-height:1.7;
  overflow-x:hidden;
  min-height:100vh;
}

*,*::before,*::after{
  animation:none!important;
  scroll-behavior:auto!important;
}

/* Star field background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.6;
  background-image:
    radial-gradient(1px 1px at 10% 20%,rgba(200,190,160,0.4),transparent),
    radial-gradient(1px 1px at 25% 45%,rgba(200,190,160,0.3),transparent),
    radial-gradient(1.2px 1.2px at 40% 15%,rgba(220,210,180,0.5),transparent),
    radial-gradient(1px 1px at 55% 70%,rgba(200,190,160,0.3),transparent),
    radial-gradient(1px 1px at 70% 30%,rgba(200,190,160,0.4),transparent),
    radial-gradient(1.5px 1.5px at 85% 55%,rgba(220,210,180,0.5),transparent),
    radial-gradient(1px 1px at 15% 80%,rgba(200,190,160,0.3),transparent),
    radial-gradient(1px 1px at 30% 60%,rgba(200,190,160,0.2),transparent),
    radial-gradient(1.2px 1.2px at 50% 85%,rgba(220,210,180,0.4),transparent),
    radial-gradient(1px 1px at 75% 10%,rgba(200,190,160,0.3),transparent),
    radial-gradient(1px 1px at 90% 75%,rgba(200,190,160,0.2),transparent),
    radial-gradient(1px 1px at 5% 50%,rgba(200,190,160,0.3),transparent),
    radial-gradient(1.3px 1.3px at 60% 40%,rgba(220,210,180,0.4),transparent),
    radial-gradient(1px 1px at 35% 90%,rgba(200,190,160,0.2),transparent),
    radial-gradient(1px 1px at 95% 20%,rgba(200,190,160,0.3),transparent);
}

/* Subtle noise texture */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.015;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(180,160,100,0.12);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(180,160,100,0.25)}

/* ===== HEADER ===== */
.header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:rgba(5,5,8,0.85);
  backdrop-filter:blur(20px) saturate(1.1);
  border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;
}
.header-logo{display:flex;align-items:center;gap:12px}
.header-logo .logo-mark{
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:20px;
  color:var(--gold);font-style:italic;
  opacity:0.8;
}
.header-logo span{
  font-family:var(--font-zh-title);font-size:24px;font-weight:600;
  letter-spacing:0.08em;color:var(--text-primary);
}
.header-tagline{
  font-family:var(--font-serif);font-size:26px;
  color:var(--text-muted);font-style:italic;
  letter-spacing:0.08em;
  display:none;
}
@media(min-width:900px){.header-tagline{display:block}}
.header-actions{display:flex;align-items:center;gap:12px}
.search-toggle{
  background:none;border:1px solid var(--border-subtle);
  color:var(--text-secondary);width:32px;height:32px;
  border-radius:4px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.search-toggle:hover{border-color:var(--gold);color:var(--gold)}
.search-shortcut{
  font-family:var(--font-serif);font-size:14px;
  color:var(--text-muted);padding:3px 8px;
  border:1px solid var(--border-subtle);border-radius:3px;
  display:none;letter-spacing:0.02em;
}
@media(min-width:900px){.search-shortcut{display:block}}
.menu-toggle{
  display:none;background:none;border:none;
  color:var(--text-primary);cursor:pointer;padding:4px;
}
.menu-toggle svg{width:20px;height:20px}

/* ===== PRISM NAV (global-menu.js) ===== */
#prism-nav{
  position:fixed;top:var(--header-h);left:0;bottom:0;
  width:var(--prism-expanded-w);
  background:var(--bg-surface);
  border-right:1px solid var(--border-subtle);
  z-index:55;
  display:flex;flex-direction:column;
  padding:0;
  transition:width 0.28s cubic-bezier(0.22,1,0.36,1);
  overflow:hidden;
  will-change:width;
  contain:layout paint style;
}
#prism-nav.pn-collapsed{width:var(--prism-collapsed-w)}
.pn-inner{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
  padding:20px 0 0;
}
.pn-nodes{
  display:flex;flex-direction:column;gap:4px;
  padding:0 8px;flex:1;overflow-y:auto;overflow-x:hidden;
}
.pn-inner::-webkit-scrollbar{width:3px}
.pn-inner::-webkit-scrollbar-thumb{background:rgba(180,160,100,0.15);border-radius:2px}
.pn-node{border-radius:8px;overflow:hidden;transition:background 0.2s}
.pn-node.pn-node-expanded{background:rgba(255,255,255,0.015)}
.pn-node-trigger{
  display:flex;align-items:center;gap:10px;padding:10px 8px;
  text-decoration:none;color:var(--text-secondary);
  transition:all 0.2s;position:relative;border-radius:8px;
}
.pn-node-trigger:hover{background:rgba(255,255,255,0.02);color:var(--text-primary)}
.pn-node-icon{
  width:18px;height:18px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.pn-node-icon svg{width:100%;height:100%}
.pn-node-trigger:hover .pn-node-icon{transform:scale(1.1)}
.pn-node-label{
  font-size:16px;font-weight:500;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  transition:opacity 0.12s ease;
}
.pn-node-label-en{
  font-family:var(--font-serif);font-size:14px;
  color:var(--text-muted);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  transition:opacity 0.12s ease;
}
.pn-collapsed .pn-node-label,.pn-collapsed .pn-node-label-en{
  opacity:0;pointer-events:none;
}
.pn-node-active>.pn-node-trigger{color:var(--text-primary);font-weight:600}
.pn-node-glow{
  position:absolute;left:0;top:10%;bottom:10%;width:2.5px;
  background:linear-gradient(180deg,transparent,var(--gold),transparent);
  border-radius:0 1.5px 1.5px 0;
}
.pn-collapsed .pn-node-glow{left:-1px}
.pn-node-subs{
  max-height:0;overflow:hidden;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1),opacity 0.2s;
  opacity:0;padding:0 6px 0 34px;
}
.pn-animating .pn-node-subs{transition:none!important}
.pn-node-expanded .pn-node-subs{max-height:600px;opacity:1;padding:2px 6px 8px 34px}
.pn-collapsed .pn-node-subs{max-height:0!important;opacity:0!important;padding:0!important}
.pn-sub{display:flex;align-items:flex-start;gap:6px;padding:5px 3px;text-decoration:none;transition:all 0.12s;border-radius:5px}
.pn-sub:hover{background:rgba(255,255,255,0.02)}
.pn-sub-dot{width:3.5px;height:3.5px;border-radius:50%;background:var(--text-muted);margin-top:5.5px;flex-shrink:0;transition:all 0.15s}
.pn-sub:hover .pn-sub-dot{background:var(--gold)}
.pn-sub-text{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.pn-sub-label{font-size:16px;color:var(--text-secondary);transition:color 0.12s}
.pn-sub:hover .pn-sub-label{color:var(--text-primary)}
.pn-sub-desc{font-family:var(--font-serif);font-size:14px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pn-footer{
  flex-shrink:0;padding:10px 8px 12px;
  border-top:1px solid var(--border-subtle);
  background:var(--bg-surface);
}
.pn-toggle{
  width:100%;height:36px;background:var(--bg-elevated);
  border:1px solid var(--border-subtle);border-radius:6px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  color:var(--text-muted);font-size:13px;transition:background 0.18s,color 0.18s,border-color 0.18s;z-index:56;
}
.pn-toggle:hover{background:var(--bg-card-hover);color:var(--gold);border-color:var(--border-active)}
.pn-toggle-icon{font-size:16px;line-height:1;transition:transform 0.2s}
.pn-toggle-text{white-space:nowrap;overflow:hidden;max-width:48px;opacity:1;transition:opacity 0.16s,max-width 0.2s}
.pn-collapsed .pn-toggle{width:40px;margin:0 auto;gap:0}
.pn-collapsed .pn-toggle-text{max-width:0;opacity:0}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;top:var(--header-h);left:var(--prism-expanded-w);bottom:0;
  width:var(--sidebar-w);
  background:var(--bg-surface);
  border-right:1px solid var(--border-subtle);
  overflow-y:auto;z-index:50;
  padding:0;
  transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);
  transform:translateX(var(--prism-shift, 0px));
  will-change:transform;
}
.sidebar-search-wrap{
  padding:10px 12px;
  position:sticky;top:0;
  background:var(--bg-surface);
  z-index:2;
  border-bottom:0.5px solid var(--border-subtle);
}
.sidebar-search{
  width:100%;
  background:var(--bg-elevated);
  border:0.5px solid var(--border-subtle);
  border-radius:4px;
  padding:7px 10px 7px 28px;
  font-size:13px;color:var(--text-primary);
  font-family:var(--font-zh-body);
  outline:none;
  transition:border-color 0.15s;
}
.sidebar-search:focus{border-color:var(--gold-dim)}
.sidebar-search::placeholder{color:var(--text-muted)}
.sidebar-search-icon{
  position:absolute;left:20px;top:50%;
  transform:translateY(-50%);
  width:14px;height:14px;
  color:var(--text-muted);pointer-events:none;
}
.sidebar-content{
  padding:12px 0;
}
.sidebar-section{margin-bottom:2px}
.sidebar-section-title{
  padding:8px 16px;
  font-family:var(--font-serif);
  font-size:14px;font-weight:400;
  text-transform:uppercase;letter-spacing:0.2em;
  color:var(--text-muted);
}
.sidebar-item{
  display:flex;align-items:center;gap:12px;
  padding:8px 16px;cursor:pointer;
  transition:all 0.12s;position:relative;
}
.sidebar-item:hover{background:rgba(255,255,255,0.02)}
.sidebar-item.active{background:var(--gold-glow)}
.sidebar-item.active::after{
  content:'';position:absolute;left:0;top:6px;bottom:6px;
  width:1.5px;background:var(--gold);
}
.sidebar-item .item-icon{
  width:5px;height:5px;border-radius:50%;
  background:var(--text-muted);flex-shrink:0;
  transition:all 0.15s;
}
.sidebar-item.active .item-icon{background:var(--gold)}
.sidebar-item .item-label{
  font-size:16px;color:var(--text-secondary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color 0.15s;
}
.sidebar-item.active .item-label{color:var(--text-primary);font-weight:500;font-size:24px}
.sidebar-item .item-label-en{
  font-family:var(--font-serif);font-size:14px;
  color:var(--text-muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sidebar-item.active .item-label-en{color:var(--gold-dim)}
.sidebar-sub-item{
  display:flex;align-items:center;gap:6px;
  padding:5px 16px 5px 34px;cursor:pointer;
  transition:all 0.12s;
}
.sidebar-sub-item:hover{background:rgba(255,255,255,0.015)}
.sidebar-sub-item.active{background:var(--gold-glow2)}
.sidebar-sub-item.active::after{
  content:'';position:absolute;left:0;top:5px;bottom:5px;
  width:1px;background:var(--gold-dim);opacity:0.4;
}
.sidebar-sub-item .sub-dot{width:2.5px;height:2.5px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.sidebar-sub-item.active .sub-dot{background:var(--gold-dim)}
.sidebar-sub-item .sub-label{font-size:16px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-sub-item.active .sub-label{color:var(--text-secondary)}

/* ===== MAIN CONTENT ===== */
.main{
  margin-left:calc(var(--prism-expanded-w) + var(--sidebar-w));
  margin-top:var(--header-h);
  min-height:calc(100vh - var(--header-h));
  padding:40px 40px 100px;
  transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);
  transform:translateX(var(--prism-shift, 0px));
  will-change:transform;
}
.main.is-bookmark-restoring{
  visibility:hidden;
}

/* ===== WELCOME / HERO ===== */
.hero{
  position:relative;
}
.hero-ornament{
  display:flex;align-items:center;gap:16px;margin-bottom:28px;
}
.hero-ornament .line{flex:1;height:0.5px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
.hero-ornament .center-mark{
  width:6px;height:6px;
  border:0.5px solid var(--gold-dim);
  transform:rotate(45deg);flex-shrink:0;
}

.hero-eyebrow{
  font-family:var(--font-serif);font-size:14px;
  text-transform:uppercase;letter-spacing:0.3em;
  color:var(--gold);margin-bottom:20px;
  opacity:1;
}
.hero h1{
  font-family:var(--font-zh-title);
  font-size:clamp(32px,5vw,48px);
  font-weight:300;line-height:1.2;
  margin-bottom:6px;
  color:var(--star);
  opacity:1;
}
.hero .subtitle-en{
  font-family:var(--font-display);
  font-size:clamp(16px,2vw,20px);
  color:var(--text-muted);font-weight:400;
  margin-bottom:32px;font-style:italic;
  opacity:1;
}
.hero-desc{
  font-size:16px;color:var(--text-secondary);
  line-height:2;margin-bottom:32px;
  opacity:1;
}

/* Stats */
.stats-bar{
  display:flex;gap:0;
  margin-bottom:36px;
  opacity:1;
}
.stat-item{
  flex:1;
  padding:20px 16px;
  text-align:center;
  position:relative;
}
.stat-item:not(:last-child)::after{
  content:'';position:absolute;right:0;top:20%;bottom:20%;
  width:0.5px;background:var(--border-subtle);
}
.stat-num{
  font-family:var(--font-display);
  font-size:28px;color:var(--gold);line-height:1;
  margin-bottom:6px;
  font-style:italic;
}
.stat-label{
  font-family:var(--font-serif);
  font-size:14px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.18em;
}

/* Featured Quote */
.featured-quote{
  position:relative;
  padding:28px 32px;
  margin-bottom:40px;
  border-left:1px solid var(--gold-dim);
  opacity:1;
}
.featured-quote::before{
  content:'';position:absolute;top:0;left:0;bottom:0;right:0;
  background:linear-gradient(135deg,var(--gold-glow2),transparent);
  pointer-events:none;
}
.featured-quote .fq-text{
  font-family:var(--font-display);
  font-size:16px;color:var(--text-primary);
  line-height:1.85;font-style:italic;
  position:relative;z-index:1;
  margin-bottom:10px;
}
.featured-quote .fq-zh{
  font-size:16px;color:var(--text-secondary);line-height:1.85;
  position:relative;z-index:1;
}
.featured-quote .fq-source{
  font-family:var(--font-serif);font-size:14px;
  color:var(--text-muted);margin-top:20px;
  letter-spacing:0.1em;
}

/* Section Header */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
  opacity:1;
}
.section-header h2{
  font-family:var(--font-zh-title);font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  letter-spacing:0.04em;
}
.section-header h2::before{
  content:'';width:2px;height:14px;
  background:var(--gold);border-radius:1px;
}
.section-header .count{
  font-family:var(--font-serif);font-size:14px;
  color:var(--text-muted);letter-spacing:0.05em;
}

/* Concept Grid */
.concept-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
  opacity:1;
}
.category-separator{
  grid-column:1/-1;
  margin-top:28px;margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:0.5px solid var(--border-subtle);
}
.category-separator .cat-label{
  font-family:var(--font-zh-title);font-size:14px;font-weight:600;
  color:var(--gold);letter-spacing:0.1em;
  display:flex;align-items:center;gap:8px;
}
.category-separator .cat-count{
  font-family:var(--font-serif);font-size:14px;
  color:var(--text-muted);font-weight:400;
}
.concept-preview{
  background:var(--bg-card);
  border:0.5px solid var(--border-subtle);
  border-radius:6px;padding:16px;
  cursor:pointer;transition:all 0.2s;
  position:relative;overflow:hidden;
}
.concept-preview:hover{
  border-color:var(--border-active);
  background:var(--bg-card-hover);
  transform:translateY(-1px);
}
.concept-preview .cp-num{
  font-family:var(--font-serif);font-size:14px;
  color:var(--text-muted);margin-bottom:6px;
  letter-spacing:0.08em;
}
.concept-preview h3{
  font-family:var(--font-zh-title);
  font-size:16px;font-weight:600;
  margin-bottom:2px;line-height:1.4;
}
.concept-preview .cp-en{
  font-family:var(--font-display);font-size:14px;
  color:var(--gold-dim);font-style:italic;
  margin-bottom:8px;
}
.concept-preview p{
  font-size:14px;color:var(--text-muted);
  line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}

/* ===== CONCEPT DETAIL ===== */
.concept-detail{
  animation:none;
}
.concept-detail .back-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:none;border:none;
  color:var(--text-muted);cursor:pointer;
  font-family:var(--font-serif);font-size:14px;
  margin-bottom:32px;transition:color 0.15s;padding:4px 0;
  letter-spacing:0.05em;
}

.back-to-top{

}

.sub-concept-list{display:grid;gap:10px}

/* Search Modal */
.search-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.5);

.search-result-item{

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  Promise.all([
    fetch('concepts-lite.json').then(r => {
      if (!r.ok) throw new Error('Failed to load concepts: ' + r.status);
      return r.json();
    }),
    fetch('concept-graph.json').then(r => r.ok ? r.json() : { nodes: [], edges: [], metadata: {} }).catch(() => ({ nodes: [], edges: [], metadata: {} }))
  ])
    .then(([data, graphData]) => {
      conceptGraph = graphData || { nodes: [], edges: [], metadata: {} };
      allConcepts = Array.isArray(data) ? data : data.concepts;
      flatConcepts = [];
      conceptMap = {};
      allConcepts.forEach(c => {
        flatConcepts.push(c);
        conceptMap[c.id] = c;
        (c.sub_concepts || []).forEach(sc => {
          flatConcepts.push({...sc, parentId: c.id});
          conceptMap[sc.id] = {...sc, parentId: c.id};
        });
      });
      renderSidebar();
      restoreLastView();
    })
    .catch(err => {
      const main = document.getElementById('main');
      if (main) {
        main.innerHTML = '<div class="concept-detail"><div class="concept-header"><div class="category-badge">Load Error</div><h1>数据加载失败</h1><div class="explanation">请通过本地服务器访问：<br><a style="color:var(--gold)" href="http://localhost:8081/index.html">http://localhost:8081/index.html</a></div></div></div>';
      }
      console.error(err);
    });
}

function getViewKey(view) {
  if (!view || view.type === 'home') return 'home';
  return 'concept:' + view.id + (view.parentId ? ':' + view.parentId : '');
}

function readReadingState() {
  try {
    var stored = '';
    if (window.localStorage) {
      stored = window.localStorage.getItem(READING_STATE_KEY) || '';
    }
    if (!stored) {
      var match = document.cookie.match(new RegExp('(?:^|; )' + READING_STATE_KEY + '=([^;]*)'));
      stored = match ? decodeURIComponent(match[1]) : '';
    }
    return JSON.parse(stored || '{}');
  } catch(e) {
    return {};
  }
}

function writeReadingState(state) {
  var serialized = JSON.stringify(state);
  try {
    if (window.localStorage) {
      window.localStorage.setItem(READING_STATE_KEY, serialized);
      return;
    }
  } catch(e) {}
  try {
    document.cookie = READING_STATE_KEY + '=' + encodeURIComponent(serialized) + '; path=/; max-age=31536000; SameSite=Lax';
  } catch(e) {}
}

function sanitizeBookmark(bookmark) {
  if (!bookmark || !bookmark.view || !bookmark.view.type) return null;
  var y = Number(bookmark.y || 0);
  return {
    view: {
      type: bookmark.view.type,
      id: bookmark.view.id || '',
      parentId: bookmark.view.parentId || ''
    },
    y: isFinite(y) ? Math.max(0, y) : 0,
    quoteId: bookmark.quoteId || '',
    quoteOffset: isFinite(Number(bookmark.quoteOffset)) ? Number(bookmark.quoteOffset) : 0,
    label: bookmark.label || '',
    updatedAt: bookmark.updatedAt || '',
    clientVersion: bookmark.clientVersion || ''
  };
}

function readLocalBookmark() {
  const state = readReadingState();
  const store = sanitizeBookmarkStore(state.bookmarkStore || state);
  const key = getViewKey(currentView);
  return store.bookmarks[key] || null;
}

function sanitizeBookmarkStore(data) {
  var store = {
    clientVersion: BOOKMARK_VERSION,
    lastView: { type: 'home' },
    bookmarks: {}
  };
  if (!data || typeof data !== 'object') return store;

  if (data.bookmarks && typeof data.bookmarks === 'object') {
    Object.keys(data.bookmarks).forEach(function(key) {
      var bookmark = sanitizeBookmark(data.bookmarks[key]);
      if (bookmark) store.bookmarks[key] = bookmark;
    });
    store.lastView = data.lastView || store.lastView;
  } else {
    var single = sanitizeBookmark(data.bookmark || data);
    if (single) {
      var singleKey = getViewKey(single.view);
      store.bookmarks[singleKey] = single;
      store.lastView = single.view;
    }
  }
  store.clientVersion = BOOKMARK_VERSION;
  return store;
}

function getBookmarkForView(view) {
  var key = getViewKey(view);
  return sanitizeBookmark(bookmarkStore.bookmarks[key]);
}

function writeLocalBookmarkStore(store) {
  bookmarkStore = sanitizeBookmarkStore(store);
  const state = readReadingState();
  state.bookmarkStore = bookmarkStore;
  state.lastView = bookmarkStore.lastView || state.lastView || { type: 'home' };
  state.positions = state.positions || {};
  Object.keys(bookmarkStore.bookmarks).forEach(function(key) {
    state.positions[key] = bookmarkStore.bookmarks[key].y || 0;
  });
  var currentBookmark = getBookmarkForView(currentView);
  if (currentBookmark) {
    state.bookmark = currentBookmark;
    activeBookmark = currentBookmark;
  }
  writeReadingState(state);
  updateBookmarkIndicator();
}

function loadBookmark() {
  return new Promise(function(resolve) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/bookmark.json?t=' + Date.now(), true);
    xhr.setRequestHeader('Cache-Control', 'no-cache');
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          var data = JSON.parse(xhr.responseText || '{}');
          var store = sanitizeBookmarkStore(data);
          writeLocalBookmarkStore(store);
          resolve(store);
          return;
        } catch(e) {}
      }
      var fallbackStore = sanitizeBookmarkStore(readReadingState().bookmarkStore || readReadingState());
      writeLocalBookmarkStore(fallbackStore);
      resolve(fallbackStore);
    };
    xhr.onerror = function() {
      var fallbackStore = sanitizeBookmarkStore(readReadingState().bookmarkStore || readReadingState());
      writeLocalBookmarkStore(fallbackStore);
      resolve(fallbackStore);
    };
    xhr.send();
  });
}

function persistBookmarkRemote(store) {
  if (!store) return;
  fetch(BOOKMARK_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(store)
  }).catch(function() {});
}

function scheduleBookmarkRemoteSave(store) {
  clearTimeout(saveBookmarkTimer);
  saveBookmarkTimer = setTimeout(function() {
    persistBookmarkRemote(store);
  }, 700);
}

function getCurrentViewLabel() {
  if (currentView.type === 'home') return '首页';
  var concept = currentView.id ? conceptMap[currentView.id] : null;
  return concept ? concept.name_zh : '当前位置';
}

function getVisibleQuoteBookmark() {
  var cards = document.querySelectorAll('.quote-card[data-quote-id]');
  var best = null;
  var headerBottom = 72;
  cards.forEach(function(card) {
    if (best) return;
    var rect = card.getBoundingClientRect();
    if (rect.bottom > headerBottom && rect.top < window.innerHeight) {
      best = {
        id: card.dataset.quoteId || '',
        offset: Math.max(0, (window.scrollY || document.documentElement.scrollTop || 0) - (rect.top + window.scrollY))
      };
    }
  });
  return best || { id: '', offset: 0 };
}

function buildCurrentBookmark() {
  var y = Math.max(0, window.scrollY || document.documentElement.scrollTop || 0);
  var visibleQuote = getVisibleQuoteBookmark();
  return {
    view: {
      type: currentView.type,
      id: currentView.id || '',
      parentId: currentView.parentId || ''
    },
    y: y,
    quoteId: visibleQuote.id,
    quoteOffset: visibleQuote.offset || 0,
    label: getCurrentViewLabel(),
    updatedAt: new Date().toISOString(),
    clientVersion: BOOKMARK_VERSION
  };
}

function saveReadingPosition() {
  if (isRestoringScroll || Date.now() < suppressBookmarkSaveUntil || !userScrolledSinceRender) return;
  const state = readReadingState();
  const bookmark = buildCurrentBookmark();
  const key = getViewKey(bookmark.view);
  bookmarkStore.bookmarks[key] = bookmark;
  bookmarkStore.lastView = bookmark.view;
  bookmarkStore.clientVersion = BOOKMARK_VERSION;
  state.lastView = currentView;
  state.positions = state.positions || {};
  state.positions[key] = bookmark.y;
  state.bookmark = bookmark;
  state.bookmarkStore = bookmarkStore;
  activeBookmark = bookmark;
  writeReadingState(state);
  updateBookmarkIndicator();
  scheduleBookmarkRemoteSave(bookmarkStore);
}

function scheduleSaveReadingPosition() {
  updateBackToTopVisibility();
  clearTimeout(saveScrollTimer);
  saveScrollTimer = setTimeout(saveReadingPosition, 120);
}

function restoreScrollForCurrentView(defaultY, bookmark) {
  const state = readReadingState();
  const positions = state.positions || {};
  const savedY = bookmark && typeof bookmark.y === 'number' ? bookmark.y : positions[getViewKey(currentView)];
  const targetY = typeof savedY === 'number' ? savedY : (defaultY || 0);
  const targetKey = getViewKey(currentView);

  clearTimeout(restoreScrollTimer);
  isRestoringScroll = true;
  restoreScrollAttempts = 0;
  pendingScrollRestore = {
    key: targetKey,
    y: Math.max(0, targetY),
    quoteId: bookmark && bookmark.quoteId ? bookmark.quoteId : '',
    quoteOffset: bookmark && isFinite(Number(bookmark.quoteOffset)) ? Number(bookmark.quoteOffset) : 0
  };
  applyPendingScrollRestore();
}

function getBookmarkTargetY(pending) {
  if (!pending) return 0;
  if (pending.quoteId) {
    var selector = '.quote-card[data-quote-id="' + CSS.escape(pending.quoteId) + '"]';
    var card = document.querySelector(selector);
    if (card) {
      var rect = card.getBoundingClientRect();
      var pageY = rect.top + (window.scrollY || document.documentElement.scrollTop || 0);
      return Math.max(0, pageY + (pending.quoteOffset || 0));
    }
  }
  return Math.max(0, pending.y || 0);
}

function applyPendingScrollRestore() {
  if (!pendingScrollRestore) {
    isRestoringScroll = false;
    setBookmarkRestoringVisibility(false);
    return;
  }
  if (pendingScrollRestore.key !== getViewKey(currentView)) {
    pendingScrollRestore = null;
    isRestoringScroll = false;
    setBookmarkRestoringVisibility(false);
    return;
  }

  requestAnimationFrame(function() {
    const doc = document.documentElement;
    const maxY = Math.max(0, doc.scrollHeight - window.innerHeight);
    var rawTargetY = getBookmarkTargetY(pendingScrollRestore);
    const targetY = Math.min(Math.max(0, rawTargetY), maxY);
    window.scrollTo(0, targetY);
    updateBackToTopVisibility();
    restoreScrollAttempts += 1;

    const currentY = window.scrollY || doc.scrollTop || 0;
    const quoteResolved = !pendingScrollRestore.quoteId || !!document.querySelector('.quote-card[data-quote-id="' + CSS.escape(pendingScrollRestore.quoteId) + '"]');
    const hasEnoughHeight = maxY >= rawTargetY;
    const reachedTarget = Math.abs(currentY - targetY) <= 2;

    if ((quoteResolved && hasEnoughHeight && reachedTarget) || restoreScrollAttempts >= 36) {
      clearTimeout(restoreScrollTimer);
      setTimeout(function() {
        pendingScrollRestore = null;
        isRestoringScroll = false;
        suppressBookmarkSaveUntil = Date.now() + 1500;
        setBookmarkRestoringVisibility(false);
        updateBackToTopVisibility();
      }, 120);
      return;
    }

    restoreScrollTimer = setTimeout(applyPendingScrollRestore, 80);
  });
}

function positionAfterRender(options) {
  userScrolledSinceRender = false;
  if (!(options && options.keepHiddenUntilRestore)) {
    setBookmarkRestoringVisibility(false);
  }
  if (options && options.restore) {
    restoreScrollForCurrentView(0, options.bookmark || null);
  } else {
    window.scrollTo(0, 0);
    updateBackToTopVisibility();
  }
  activeBookmark = getBookmarkForView(currentView) || null;
  updateBookmarkIndicator();
}

function shouldDeferQuoteBookmarkRestore(options) {
  return !!(options && options.restore && options.bookmark && options.bookmark.quoteId && currentView.type === 'concept');
}

function setBookmarkRestoringVisibility(hidden) {
  var main = document.getElementById('main');
  if (main) main.classList.toggle('is-bookmark-restoring', !!hidden);
}

function restoreLastView() {
  suppressBookmarkSaveUntil = Date.now() + 1500;
  loadBookmark().then(function(store) {
    store = sanitizeBookmarkStore(store);
    bookmarkStore = store;
    isRestoringScroll = false;
    showWelcome({ skipSave: true });
  }).catch(function() {
    isRestoringScroll = false;
    showWelcome({ skipSave: true });
  });
}

function updateBackToTopVisibility() {
  const btn = document.getElementById('backToTop');
  if (!btn) return;
  btn.classList.toggle('visible', (window.scrollY || document.documentElement.scrollTop || 0) > 360);
}

function updateBookmarkIndicator() {
  const btn = document.getElementById('readingBookmark');
  const status = document.getElementById('bookmarkStatus');
  if (!btn) return;
  const bookmark = getBookmarkForView(currentView) || readLocalBookmark();
  btn.classList.toggle('active', !!bookmark);
  if (status) status.classList.toggle('active', !!bookmark);
  if (!bookmark) {
    btn.setAttribute('title', '正在记录书签 · ' + BOOKMARK_VERSION);
    if (status) status.innerHTML = '书签 <span class="bookmark-version">' + BOOKMARK_VERSION.replace('bookmark-', '') + '</span>';
    return;
  }
  var label = bookmark.label || '当前位置';
  var y = Math.round(bookmark.y || 0);
  btn.setAttribute('title', '书签：' + label + ' · 位置 ' + y + '。点击回到这里 · ' + BOOKMARK_VERSION);
  if (status) status.innerHTML = label + ' · ' + y + ' <span class="bookmark-version">' + BOOKMARK_VERSION.replace('bookmark-', '') + '</span>';
}

function jumpToBookmark() {
  const bookmark = getBookmarkForView(currentView) || readLocalBookmark();
  if (!bookmark) {
    saveReadingPosition();
    return;
  }
  activeBookmark = bookmark;
  if (bookmark.view.type === 'concept' && conceptMap[bookmark.view.id]) {
    if (currentView.type === 'concept' && currentView.id === bookmark.view.id && (currentView.parentId || '') === (bookmark.view.parentId || '')) {
      if (renderConceptForBookmark(bookmark)) return;
      restoreScrollForCurrentView(0, bookmark);
    } else {
      showConcept(bookmark.view.id, bookmark.view.parentId, { restore: true, skipSave: true, bookmark: bookmark });
    }
  } else {
    showWelcome({ restore: true, skipSave: true, bookmark: bookmark });
  }
}

function scrollToPageTop() {
  window.scrollTo(0, 0);
  updateBackToTopVisibility();
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '<div class="sidebar-search-wrap"><svg class="sidebar-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input class="sidebar-search" id="sidebarSearch" type="text" placeholder="搜索概念..." oninput="filterSidebar(this.value)"></div><div class="sidebar-content" id="sidebarContent"></div>';

function definitionToText(definition) {
  if (!definition) return '';
  if (typeof definition === 'string') return definition;
  if (Array.isArray(definition)) {
    return definition.map(function(def) {
      if (!def) return '';
      if (typeof def === 'string') return def;
      return [def.zh, def.en, def.source].filter(Boolean).join(' ');
    }).filter(Boolean).join(' ');
  }
  if (typeof definition === 'object') {
    return [definition.zh, definition.en, definition.source].filter(Boolean).join(' ');
  }
  return String(definition);
}

function filterSidebar(query) {
  if (!query || !query.trim()) {
    renderSidebarContent(allConcepts);
    return;
  }
  var q = query.toLowerCase();
  var filtered = allConcepts.filter(function(c) {
    return c.name_zh.indexOf(query) !== -1 ||
           c.name_en.toLowerCase().indexOf(q) !== -1 ||
           definitionToText(c.definition).toLowerCase().indexOf(q) !== -1;
  });
  renderSidebarContent(filtered);
}

function setActiveSidebar(id) {
  document.querySelectorAll('.sidebar-item,.sidebar-sub-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
}

function countTotalQuotes() {
  let total = 0;
  allConcepts.forEach(c => {
    total += c.quotes_count || (c.quotes || []).length || 0;
    (c.sub_concepts || []).forEach(sc => { total += (sc.quotes || []).length; });
  });
  return total;
}

function getGraphNodeStats(nodeId) {
  const edges = (conceptGraph.edges || []).filter(e => e.source === nodeId || e.target === nodeId);
  const neighbors = edges.map(e => e.source === nodeId ? e.target : e.source);
  return {
    edgeCount: edges.length,
    weight: edges.reduce((sum, e) => sum + (e.weight || 0), 0),
    neighbors: Array.from(new Set(neighbors)).map(id => conceptMap[id]).filter(Boolean)
  };
}

function renderGraphPanel(node) {
  const panel = document.getElementById('graphPanel');
  if (!panel || !node) return;
  const concept = conceptMap[node.id] || node;
  const stats = getGraphNodeStats(node.id);
  const neighbors = stats.neighbors
    .sort((a, b) => (b.quotes_count || 0) - (a.quotes_count || 0))
    .slice(0, 12)
    .map(n => `<button class="graph-neighbor" onclick="focusGraphNode('${n.id}')">${n.name_zh}</button>`)
    .join('');
  panel.innerHTML = `
    <div>
      <div class="graph-panel-title">${concept.name_zh}</div>
      <div class="graph-panel-sub">${concept.name_en}</div>
    </div>
    <div class="graph-stats">
      <div class="graph-stat"><strong>${concept.quotes_count || 0}</strong><span>摘录</span></div>
      <div class="graph-stat"><strong>${stats.edgeCount}</strong><span>关联</span></div>
    </div>
    <div class="graph-panel-sub">相邻概念</div>
    <div class="graph-neighbors">${neighbors || '<span style="color:var(--text-muted);font-size:12px">暂无可展示关系</span>'}</div>
    <button class="graph-open-btn" onclick="showConcept('${node.id}')">打开概念页</button>
  `;
}

function focusGraphNode(nodeId) {
  const svg = document.getElementById('conceptGraphSvg');
  if (!svg) return;
  const node = (conceptGraph.nodes || []).find(n => n.id === nodeId);
  if (!node) return;
  const related = new Set([nodeId]);
  (conceptGraph.edges || []).forEach(e => {
    if (e.source === nodeId) related.add(e.target);
    if (e.target === nodeId) related.add(e.source);
  });
  svg.querySelectorAll('.graph-node').forEach(el => {
    const active = el.dataset.id === nodeId;
    el.classList.toggle('graph-active', active);
    el.classList.toggle('graph-muted', !related.has(el.dataset.id));
  });
  svg.querySelectorAll('.graph-edge').forEach(el => {
    const active = el.dataset.source === nodeId || el.dataset.target === nodeId;
    el.classList.toggle('graph-active', active);
    el.classList.toggle('graph-muted', !active);
  });
  renderGraphPanel(node);
}

const QUOTE_ROLE_LABELS = {
  definition: '定义',
  principle: '原则',
  mechanism: '机制',
  distinction: '区别',
  practice: '方法',
  example: '例子',
  warning: '提醒',
  background: '背景',
  other: '其他'
};

function quoteSortKey(q) {
  return [
    Number(q.reading_order || 90),
    -Number(q.semantic_score || 0),
    -Number(q.score || 0),
    q.source || ''
  ];
}

function sortQuotesForReading(quotes) {
  return (quotes || []).slice().sort(function(a, b) {
    var ak = quoteSortKey(a);
    var bk = quoteSortKey(b);
    for (var i = 0; i < ak.length; i++) {
      if (ak[i] < bk[i]) return -1;
      if (ak[i] > bk[i]) return 1;
    }
    return 0;
  });
}

function filterQuotesByRole(conceptId, role) {
  var cached = quotesCache[conceptId] || [];
  var detail = conceptDetailCache[conceptId] || conceptMap[conceptId];
  if (!detail) return;
  var filtered = role === 'all' ? cached : cached.filter(q => (q.quote_role || 'other') === role);
  var main = document.getElementById('main');
  var relatedTags = (detail.related_concepts || []).map(rid => {
    const rc = conceptMap[rid];
    return rc ? `<span class="related-tag" onclick="showConcept('${rid}')">${rc.name_zh}</span>` : '';
  }).join('');
  var subs = (detail.sub_concepts || []).map(sc =>
    `<div class="sub-concept-card" onclick="showConcept('${sc.id}','${conceptId}')">
      <span class="sc-arrow">→</span>
      <div><h3>${sc.name_zh}</h3><div class="sc-en">${sc.name_en}</div><p>${sc.definition}</p></div>
    </div>`
  ).join('');
  var backBtn = `<button class="back-btn" onclick="showWelcome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    返回首页
  </button>`;
  renderConceptDetail(main, detail, filtered, null, backBtn, relatedTags, subs, detail.quotes_count || cached.length, detail.sub_concepts_count || 0, detail.related_count || 0, false, role);
}

function renderConceptForBookmark(bookmark) {
  if (!bookmark || !bookmark.view || bookmark.view.type !== 'concept') return false;
  var conceptId = bookmark.view.id;
  var cached = quotesCache[conceptId];
  if (!cached || !cached.length) return false;

  if (bookmark.quoteId) {
    var hasQuote = cached.some(function(q) { return String(q.id || '') === String(bookmark.quoteId); });
    if (!hasQuote) return false;
  }

  var detail = conceptDetailCache[conceptId] || conceptMap[conceptId];
  if (!detail) return false;

  var main = document.getElementById('main');
  var parentId = bookmark.view.parentId || '';
  var parent = parentId ? conceptMap[parentId] : null;
  var relatedTags = (detail.related_concepts || []).map(function(rid) {
    var rc = conceptMap[rid];
    return rc ? `<span class="related-tag" onclick="showConcept('${rid}')">${rc.name_zh}</span>` : '';
  }).join('');
  var subs = (detail.sub_concepts || []).map(function(sc) {
    return `<div class="sub-concept-card" onclick="showConcept('${sc.id}','${conceptId}')">
      <span class="sc-arrow">→</span>
      <div><h3>${sc.name_zh}</h3><div class="sc-en">${sc.name_en}</div><p>${sc.definition}</p></div>
    </div>`;
  }).join('');
  var backBtn = parent ? `<button class="back-btn" onclick="showConcept('${parent.id}')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    返回：${parent.name_zh}
  </button>` : `<button class="back-btn" onclick="showWelcome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    返回首页
  </button>`;

  renderConceptDetail(main, detail, cached, parent, backBtn, relatedTags, subs, detail.quotes_count || cached.length, detail.sub_concepts_count || 0, detail.related_count || 0, false, 'all');
  restoreScrollForCurrentView(0, bookmark);
  updateBookmarkIndicator();
  return true;
}

function renderConceptGraph() {
  const svg = document.getElementById('conceptGraphSvg');
  if (!svg) return;
  const nodes = (conceptGraph.nodes || []).filter(n => conceptMap[n.id]).map(n => Object.assign({}, n));
  const edges = (conceptGraph.edges || []).filter(e => conceptMap[e.source] && conceptMap[e.target]).map(e => Object.assign({}, e));
  const width = svg.clientWidth || 800;
  const height = svg.clientHeight || 560;
  svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
  svg.innerHTML = '';
  if (!nodes.length) return;

  const maxQuotes = Math.max.apply(null, nodes.map(n => n.quotes_count || 1));
  const maxWeight = Math.max.apply(null, edges.map(e => e.weight || 1).concat([1]));
  const byId = {};
  nodes.forEach((n, i) => {
    const angle = (Math.PI * 2 * i) / nodes.length - Math.PI / 2;
    const radius = Math.min(width, height) * (0.24 + ((i % 3) * 0.045));
    n.x = width / 2 + Math.cos(angle) * radius;
    n.y = height / 2 + Math.sin(angle) * radius;
    n.vx = 0;
    n.vy = 0;
    n.r = 20 + Math.sqrt((n.quotes_count || 1) / maxQuotes) * 18;
    byId[n.id] = n;
  });

  for (let tick = 0; tick < 180; tick++) {
    edges.forEach(e => {
      const a = byId[e.source];
      const b = byId[e.target];
      if (!a || !b) return;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
      const target = 170 - Math.min(70, (e.weight / maxWeight) * 70);
      const force = (dist - target) * 0.0025;
      const fx = dx / dist * force;
      const fy = dy / dist * force;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    });
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
        const minDist = a.r + b.r + 28;
        if (dist < minDist) {
          const force = (minDist - dist) * 0.004;
          const fx = dx / dist * force;
          const fy = dy / dist * force;
          a.vx -= fx; a.vy -= fy;
          b.vx += fx; b.vy += fy;
        }
      }
    }
    nodes.forEach(n => {
      n.vx += (width / 2 - n.x) * 0.0008;
      n.vy += (height / 2 - n.y) * 0.0008;
      n.vx *= 0.82;
      n.vy *= 0.82;
      n.x = Math.max(n.r + 20, Math.min(width - n.r - 20, n.x + n.vx));
      n.y = Math.max(n.r + 20, Math.min(height - n.r - 20, n.y + n.vy));
    });
  }

  const edgeLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const nodeLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  svg.appendChild(edgeLayer);
  svg.appendChild(nodeLayer);

  edges.forEach(e => {
    const a = byId[e.source], b = byId[e.target];
    if (!a || !b) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('class', 'graph-edge');
    line.setAttribute('data-source', e.source);
    line.setAttribute('data-target', e.target);
    line.setAttribute('x1', a.x);
    line.setAttribute('y1', a.y);
    line.setAttribute('x2', b.x);
    line.setAttribute('y2', b.y);
    line.setAttribute('stroke-width', Math.max(1, Math.min(7, 1 + (e.weight / maxWeight) * 6)));
    edgeLayer.appendChild(line);
  });

  nodes.forEach(n => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'graph-node');
    g.setAttribute('data-id', n.id);
    g.setAttribute('transform', 'translate(' + n.x + ',' + n.y + ')');
    g.addEventListener('mouseenter', () => focusGraphNode(n.id));
    g.addEventListener('click', () => showConcept(n.id));

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('r', n.r);
    g.appendChild(circle);

    const zh = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    zh.setAttribute('y', -2);
    zh.textContent = n.name_zh;
    g.appendChild(zh);

    const en = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    en.setAttribute('class', 'graph-node-en');
    en.setAttribute('y', 15);
    en.textContent = n.name_en.length > 18 ? n.name_en.slice(0, 17) + '…' : n.name_en;
    g.appendChild(en);
    nodeLayer.appendChild(g);
  });

  const first = nodes.slice().sort((a, b) => (b.degree || 0) - (a.degree || 0))[0] || nodes[0];
  focusGraphNode(first.id);
}

function showConcept(id, parentId, options) {
  options = options || {};
  if (!options.skipSave) saveReadingPosition();
  currentView = { type: 'concept', id: id, parentId: parentId || '' };
  if (!options.restore) {
    var viewBookmark = getBookmarkForView(currentView);
    if (viewBookmark) {
      options = Object.assign({}, options, { restore: true, bookmark: viewBookmark });
    }
  }
  const c = conceptMap[id];
  if (!c) return;
  setActiveSidebar(id);
  const main = document.getElementById('main');

  const parent = parentId ? conceptMap[parentId] : null;
  const relatedTags = (c.related_concepts || []).map(rid => {
    const rc = conceptMap[rid];
    return rc ? `<span class="related-tag" onclick="showConcept('${rid}')">${rc.name_zh}</span>` : '';
  }).join('');

  const subs = (c.sub_concepts || []).map(sc =>
    `<div class="sub-concept-card" onclick="showConcept('${sc.id}','${id}')">
      <span class="sc-arrow">→</span>
      <div>
        <h3>${sc.name_zh}</h3>
        <div class="sc-en">${sc.name_en}</div>
        <p>${sc.definition}</p>
      </div>
    </div>`
  ).join('');

  let backBtn = '';
  if (parent) {
    backBtn = `<button class="back-btn" onclick="showConcept('${parent.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      返回：${parent.name_zh}
    </button>`;
  } else {
    backBtn = `<button class="back-btn" onclick="showWelcome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      返回首页
    </button>`;
  }

  const quoteCount = c.quotes_count || 0;
  const subCount = c.sub_concepts_count || 0;
  const relatedCount = c.related_count || 0;

  // Render without quotes first, then load them
  renderConceptDetail(main, c, [], parent, backBtn, relatedTags, subs, quoteCount, subCount, relatedCount, true);
  if (shouldDeferQuoteBookmarkRestore(options)) {
    setBookmarkRestoringVisibility(true);
    positionAfterRender(Object.assign({}, options, { restore: false, keepHiddenUntilRestore: true }));
  } else {
    positionAfterRender(options);
  }

  // Load quotes via API
  fetch('/api/concepts/' + id + '?t=' + Date.now())
    .then(r => r.json())
    .then(fullData => {
      quotesCache[id] = fullData.quotes || [];
      // Merge full data (explanation, definition, etc.) into lite object
      var merged = Object.assign({}, c, {
        explanation: fullData.explanation || '',
        definition: fullData.definition || '',
        definition_en: fullData.definition_en || '',
        definition_ai: fullData.definition_ai || '',
        definition_source: fullData.definition_source || '',
      });
      conceptDetailCache[id] = merged;
      renderConceptDetail(main, merged, fullData.quotes || [], parent, backBtn, relatedTags, subs, quoteCount, subCount, relatedCount);
      positionAfterRender(options);
    })
    .catch(function() {
      setBookmarkRestoringVisibility(false);
      // If API fails, show quotes count only
      var placeholder = document.getElementById('quotes-loading-' + id);
      if (placeholder) {
        placeholder.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:14px">' + quoteCount + ' 条摘录 — 加载失败</div>';
      }
    });
}

function renderConceptDetail(main, c, quotes, parent, backBtn, relatedTags, subs, quoteCount, subCount, relatedCount, isPlaceholder, activeRole) {
  isPlaceholder = isPlaceholder || false;
  activeRole = activeRole || 'all';

  let quotesHtml = '';
  if (quotes.length > 0) {
    quotesHtml = sortQuotesForReading(quotes).map(function(q, qi) {
      var quoteId = String(q.id || '');
      var role = q.quote_role || 'other';
      var roleLabel = QUOTE_ROLE_LABELS[role] || role;
      var quoteRelatedTags = (q.related_concepts || []).map(function(rc) {
        if (!rc || !rc.id) return '';
        if (!conceptMap[rc.id]) return '';
        return `<button class="quote-related-tag" onclick="event.stopPropagation();showConcept('${rc.id}')" title="${rc.name_en || ''}">${rc.name_zh || rc.name_en || ''}</button>`;
      }).filter(Boolean).join('');
      return '<div class="quote-card" data-quote-id="' + quoteId + '">' +
        '<button class="quote-delete-btn" onclick="deleteQuote(\'' + c.id + '\',\'' + quoteId + '\')" title="删除此摘录及原数据">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>' +
        '</button>' +
        (q.translation ? '<div class="quote-zh">' + q.translation + '</div>' : '') +
        '<div class="quote-meta-row">' +
          '<div class="quote-source"><span class="quote-role-badge">' + roleLabel + '</span>— ' + q.source + '</div>' +
          '<div class="quote-actions">' +
            '<button class="quote-action-btn" onclick="copyQuoteCard(this)" title="复制摘录">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
            '</button>' +
            '<button class="quote-action-btn" onclick="shareQuoteCard(this)" title="生成分享图片">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4"/><path d="m15.4 6.5-6.8 4"/></svg>' +
            '</button>' +
            '<button class="quote-action-btn" onclick="toggleQuoteEnglish(this)" title="展开英文原文">' +
              '<svg class="quote-expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg>' +
            '</button>' +
          '</div>' +
        '</div>' +
        (quoteRelatedTags ? '<div class="quote-related-tags">' + quoteRelatedTags + '</div>' : '') +
        '<div class="quote-en">' + q.text + '</div>' +
        '</div>';
    }).join('');
  } else if (quoteCount > 0 && isPlaceholder) {
    quotesHtml = '<div id="quotes-loading-' + c.id + '" style="padding:24px;text-align:center;color:var(--text-muted);font-size:14px">加载中 ' + quoteCount + ' 条摘录...</div>';
  }

  var roleCounts = {};
  (quotesCache[c.id] || quotes || []).forEach(function(q) {
    var role = q.quote_role || 'other';
    roleCounts[role] = (roleCounts[role] || 0) + 1;
  });
  var roleOrder = ['all','definition','principle','mechanism','distinction','practice','example','warning','background','other'];
  var filterHtml = '';
  if ((quotesCache[c.id] || quotes || []).length > 0) {
    filterHtml = '<div class="quote-filter-bar">' + roleOrder.map(function(role) {
      var count = role === 'all' ? (quotesCache[c.id] || quotes || []).length : (roleCounts[role] || 0);
      if (role !== 'all' && count === 0) return '';
      var label = role === 'all' ? '全部' : (QUOTE_ROLE_LABELS[role] || role);
      return `<button class="quote-filter-btn ${activeRole === role ? 'active' : ''}" onclick="filterQuotesByRole('${c.id}','${role}')">${label} ${count}</button>`;
    }).join('') + '</div>';
  }

  var subsHtml = '';
  if (subs && subs.length > 0) {
    subsHtml = '<div class="section-divider">' +
      '<div class="line"></div>' +
      '<div class="label"><div class="dot" style="background:var(--accent-life)"></div>子概念 · ' + subCount + '</div>' +
      '<div class="line"></div>' +
      '</div><div class="sub-concept-list">' + subs + '</div>';
  }

  main.innerHTML = '<div class="concept-detail">' +
    backBtn +
    '<div class="concept-header">' +
    '<div class="category-badge">Core Concept</div>' +
    '<h1>' + c.name_zh + '</h1>' +
    '<div class="title-en">' + c.name_en + '</div>' +
    '<div class="explanation">' + c.explanation + '</div>' +
    '<div class="def-block">' +
    buildDefinitionHtml(c.definition || []) +
    (c.definition_ai ? '<div class="def-row"><div class="def-label"><span class="lbl-dot"></span>AI阐释</div><div class="def-ai">' + c.definition_ai + '</div></div>' : '') +
    '</div>' +
    (relatedTags ? '<div class="related-tags" style="margin-top:16px;padding:0 0px 16px">' + relatedTags + '</div>' : '') +
    '</div>'+

    (quotesHtml ? '<div class="section-divider">' +
    '<div class="label" id="quoteCountLabel"><div class="dot" style="background:var(--accent-ethereal)"></div>原文摘录 · ' + quoteCount + '</div>' +
    '<div class="line"></div>' +
    '</div>' + filterHtml + quotesHtml : '') +
    subsHtml +
    '</div>';
  closeSidebarMobile();
}

function buildDefinitionHtml(definitions) {
  if (!definitions || definitions.length === 0) return '';
  
  // Handle both old format (string) and new format (array)
  if (typeof definitions === 'string') {
    return '<div class="def-row"><div class="def-label"><span class="lbl-dot"></span>定义原文</div><div class="def-zh">' + definitions + '</div></div>';
  }
  
  var html = '';
  definitions.forEach(function(def, i) {
    var zh = def.zh || '';
    var en = def.en || '';
    var source = def.source || '';
    html += '<div class="def-row def-item">' +
      '<div class="def-label"><span class="lbl-dot"></span>' + (i + 1) + '</div>' +
      (zh ? '<div class="def-zh">' + zh + '</div>' : '') +
      (en ? '<div class="def-en">' + en + '</div>' : '') +
      (source ? '<div class="def-source">— ' + source + '</div>' : '') +
      '</div>';
  });
  return html;
}

function getQuoteCardData(button) {
  var card = button.closest('.quote-card');
  if (!card) return null;
  return {
    card: card,
    zh: (card.querySelector('.quote-zh') || {}).textContent || '',
    en: (card.querySelector('.quote-en') || {}).textContent || '',
    source: ((card.querySelector('.quote-source') || {}).textContent || '').replace(/^—\s*/, '')
  };
}

function setActionFeedback(button, text) {
  var oldTitle = button.getAttribute('title') || '';
  button.setAttribute('title', text);
  button.style.color = 'var(--gold-bright)';
  setTimeout(function() {
    button.setAttribute('title', oldTitle);
    button.style.color = '';
  }, 900);
}

function copyQuoteCard(button) {
  var data = getQuoteCardData(button);
  if (!data) return;
  var text = [
    data.zh,
    data.en,
    data.source ? '— ' + data.source : ''
  ].filter(Boolean).join('\n\n');

  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      setActionFeedback(button, '已复制');
    }).catch(function() {
      fallbackCopy();
      setActionFeedback(button, '已复制');
    });
  } else {
    fallbackCopy();
    setActionFeedback(button, '已复制');
  }
}

function wrapCanvasText(ctx, text, maxWidth) {
  var chars = String(text || '').split('');
  var lines = [];
  var line = '';
  chars.forEach(function(ch) {
    var test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines;
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
  var lines = wrapCanvasText(ctx, text, maxWidth);
  if (maxLines && lines.length > maxLines) {
    lines = lines.slice(0, maxLines);
    lines[lines.length - 1] = lines[lines.length - 1].replace(/.{0,2}$/, '') + '...';
  }
  lines.forEach(function(line, i) {
    ctx.fillText(line, x, y + i * lineHeight);
  });
  return y + lines.length * lineHeight;
}

function shareQuoteCard(button) {
  var data = getQuoteCardData(button);
  if (!data) return;

  var canvas = document.createElement('canvas');
  var scale = 2;
  var width = 900;
  var padding = 64;
  var maxTextWidth = width - padding * 2;
  var zhLines, enLines;
  var measure = canvas.getContext('2d');
  measure.font = '28px serif';
  zhLines = wrapCanvasText(measure, data.zh, maxTextWidth);
  measure.font = '20px serif';
  enLines = wrapCanvasText(measure, data.en, maxTextWidth);
  var height = Math.min(1200, Math.max(560, padding * 2 + zhLines.length * 44 + Math.min(enLines.length, 9) * 32 + 150));

  canvas.width = width * scale;
  canvas.height = height * scale;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, width, height);
  ctx.fillStyle = '#101018';
  ctx.fillRect(24, 24, width - 48, height - 48);
  ctx.strokeStyle = 'rgba(180,160,100,0.32)';
  ctx.lineWidth = 1;
  ctx.strokeRect(24.5, 24.5, width - 49, height - 49);

  var brandText = '赛斯宇宙 x 星巢 丨Seth Universe';
  var brandY = padding + 2;
  var brandW = 360;
  var brandH = 34;
  var brandX = (width - brandW) / 2;
  ctx.save();
  ctx.strokeStyle = 'rgba(180,160,100,0.34)';
  ctx.fillStyle = 'rgba(180,160,100,0.055)';
  ctx.beginPath();
  ctx.moveTo(brandX + 17, brandY);
  ctx.lineTo(brandX + brandW - 17, brandY);
  ctx.quadraticCurveTo(brandX + brandW, brandY, brandX + brandW, brandY + 17);
  ctx.lineTo(brandX + brandW, brandY + brandH - 17);
  ctx.quadraticCurveTo(brandX + brandW, brandY + brandH, brandX + brandW - 17, brandY + brandH);
  ctx.lineTo(brandX + 17, brandY + brandH);
  ctx.quadraticCurveTo(brandX, brandY + brandH, brandX, brandY + brandH - 17);
  ctx.lineTo(brandX, brandY + 17);
  ctx.quadraticCurveTo(brandX, brandY, brandX + 17, brandY);
  ctx.fill();
  ctx.stroke();
  ctx.strokeStyle = 'rgba(180,160,100,0.42)';
  ctx.beginPath();
  ctx.moveTo(padding, brandY + brandH / 2);
  ctx.lineTo(brandX - 18, brandY + brandH / 2);
  ctx.moveTo(brandX + brandW + 18, brandY + brandH / 2);
  ctx.lineTo(width - padding, brandY + brandH / 2);
  ctx.stroke();
  ctx.fillStyle = '#d4c088';
  ctx.font = '16px "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(brandText, width / 2, brandY + brandH / 2 + 0.5);
  ctx.restore();

  ctx.fillStyle = '#e0dcd0';
  ctx.font = '28px "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif';
  var y = padding + 86;
  y = drawWrappedText(ctx, data.zh, padding, y, maxTextWidth, 44);

  y += 28;
  ctx.fillStyle = '#8a7a52';
  ctx.fillRect(padding, y, 1, Math.min(260, height - y - 120));
  ctx.fillStyle = '#a09880';
  ctx.font = '20px "EB Garamond", serif';
  y = drawWrappedText(ctx, data.en, padding + 20, y + 4, maxTextWidth - 20, 32, 9);

  ctx.fillStyle = '#6f6754';
  ctx.font = '15px serif';
  ctx.fillText(data.source ? '— ' + data.source : '— Seth Material', padding, Math.min(height - 66, y + 44));

  var link = document.createElement('a');
  link.download = 'seth-quote-card.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  setActionFeedback(button, '图片已生成');
}

function toggleQuoteEnglish(button) {
  var card = button.closest('.quote-card');
  if (!card) return;
  var expanded = card.classList.toggle('quote-expanded');
  button.setAttribute('title', expanded ? '收起英文原文' : '展开英文原文');
}

function deleteQuote(conceptId, quoteId) {
  if (!confirm('确定删除这条摘录及其对应原数据？')) return;
  fetch('/api/concepts/' + conceptId + '/quotes/' + encodeURIComponent(quoteId), { method: 'DELETE' })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        if (quotesCache[conceptId]) {
          quotesCache[conceptId] = quotesCache[conceptId].filter(function(q) { return q.id !== quoteId; });
        }
        var c = conceptMap[conceptId];
        if (c) c.quotes_count = data.remaining;
        var card = document.querySelector('.quote-card[data-quote-id="' + CSS.escape(quoteId) + '"]');
        if (card) {
          card.style.transition = 'opacity 0.18s ease, transform 0.18s ease, margin 0.18s ease, padding 0.18s ease, border-width 0.18s ease';
          card.style.opacity = '0';
          card.style.transform = 'translateX(8px)';
          setTimeout(function() { card.remove(); }, 180);
        }
        var label = document.getElementById('quoteCountLabel');
        if (label) label.innerHTML = '<div class="dot" style="background:var(--accent-ethereal)"></div>原文摘录 · ' + data.remaining;
      } else {
        alert('删除失败：' + (data.error || '未知错误'));
      }
    })
    .catch(function(e) {
      alert('删除请求失败：' + e.message);
    });
}

function toggleSearch() {
  const modal = document.getElementById('searchModal');
  modal.classList.toggle('active');
  if (modal.classList.contains('active')) {
    setTimeout(() => document.getElementById('searchInput').focus(), 100);
  } else {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').innerHTML = '';
  }
}

function handleSearch(query) {
  const results = document.getElementById('searchResults');
  if (!query.trim()) { results.innerHTML = ''; return; }
  const q = query.toLowerCase();
  const matches = flatConcepts.filter(c =>
    c.name_zh.toLowerCase().includes(q) ||
    c.name_en.toLowerCase().includes(q) ||
    definitionToText(c.definition).toLowerCase().includes(q) ||
    (c.explanation && c.explanation.toLowerCase().includes(q))
  ).slice(0, 20);

  results.innerHTML = matches.length ? matches.map(c => {
    const parent = c.parentId ? conceptMap[c.parentId] : null;
    const breadcrumb = parent ? `<span style="color:var(--text-muted);font-size:10px">${parent.name_zh} / </span>` : '';
    return `<div class="search-result-item" onclick="showConcept('${c.id}',${parent ? `'${c.parentId}'` : 'undefined'});toggleSearch()">
      <h4>${breadcrumb}${c.name_zh}</h4>
      <div class="sr-en">${c.name_en}</div>
      <p>${c.definition}</p>
    </div>`;
  }).join('') : '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:11.5px">没有找到匹配的概念</div>';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}
function closeSidebarMobile() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('searchModal');
    if (modal.classList.contains('active')) toggleSearch();
    closeSidebarMobile();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    toggleSearch();
  }
});

function markUserScrollIntent() {
  if (!isRestoringScroll) userScrolledSinceRender = true;
}

window.addEventListener('wheel', markUserScrollIntent, { passive: true });
window.addEventListener('touchmove', markUserScrollIntent, { passive: true });
window.addEventListener('keydown', function(e) {
  if (['ArrowDown','ArrowUp','PageDown','PageUp','Home','End',' '].indexOf(e.key) !== -1) {
    markUserScrollIntent();
  }
});
window.addEventListener('scroll', scheduleSaveReadingPosition, { passive: true });

init();
</script>
