<!DOCTYPE html>
<html lang="zh-CN" data-activeWorld="book-world">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书宇宙 - 赛斯宇宙</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg-deep:#050508;--bg-surface:#0c0c12;--bg-elevated:#141420;--bg-card:#101018;--bg-card-hover:#181824;--border-subtle:rgba(255,255,255,.055);--border-active:rgba(212,175,55,.34);--gold:#d4af37;--gold-bright:#ecd178;--text-primary:#e8e1cf;--text-secondary:#a99f85;--text-muted:#5e5748;--font-serif:"PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;--font-display:"PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;--font-zh:"PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;--font-zh-title:"PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;--prism-expanded-w:260px;--prism-collapsed-w:56px;--header-h:52px}
html{font-size:16px;scroll-behavior:auto}body{min-height:100vh;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-zh);line-height:1.7;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 52% 0%,rgba(212,175,55,.08),transparent 34%),radial-gradient(1px 1px at 12% 22%,rgba(230,210,150,.5),transparent),radial-gradient(1px 1px at 82% 48%,rgba(230,210,150,.35),transparent);opacity:.9}
.main{position:relative;z-index:1;margin-left:var(--prism-w);margin-top:var(--header-h);min-height:calc(100vh - var(--header-h));padding:40px 40px 100px;transition:margin-left .28s}
.shell{max-width:1120px;margin:0 auto}.shelf-title{font-family:var(--font-zh-title);font-size:20px;font-weight:500;color:var(--text-primary);margin:0 0 14px}
.shelf{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.book-card{min-height:150px;border:1px solid var(--border-subtle);background:linear-gradient(180deg,rgba(20,20,32,.74),rgba(12,12,18,.9));padding:20px;border-radius:8px}.book-card h2{font-family:"PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;font-size:19px;margin-bottom:4px}.book-card .en{font-family:var(--font-serif);color:var(--gold);font-size:15px;margin-bottom:18px}.book-card p{color:var(--text-muted);font-size:14px}
@media(max-width:768px){.main{margin-left:0;padding:24px 16px 60px;max-width:100vw;overflow-x:hidden}}
</style>
<link rel="stylesheet" href="site-chrome.css">
</head>
<body>
<header class="header"><div class="header-logo"><div class="logo-mark">S</div><span>赛斯宇宙</span></div><div class="header-tagline">You Create Your Own Reality</div><div class="header-actions"></div></header>
<main class="main">
  <section class="shell">
    <div class="universe-hero">
      <div class="universe-hero-ornament"><div class="line"></div><div class="center-mark"></div><div class="line"></div></div>
      <div class="universe-hero-eyebrow">Book Universe</div>
      <h1>书宇宙</h1>
      <div class="subtitle-en">Seth Books, Reading Paths and Editions</div>
      <p class="universe-hero-desc">赛斯书的阅读、索引与版本空间。这里将作为赛斯书系的独立入口，后续可承载书目、章节索引、阅读路线、版本说明、逐书摘录与原文定位。</p>
    </div>
    <h2 class="shelf-title">书系入口</h2>
    <div class="shelf">
      <article class="book-card"><h2>全部典籍</h2><div class="en">Complete Library</div><p>预留书目总览与阅读顺序。</p></article>
      <article class="book-card"><h2>章节索引</h2><div class="en">Chapter Index</div><p>预留按书、章节、session 的检索入口。</p></article>
      <article class="book-card"><h2>阅读路线</h2><div class="en">Reading Paths</div><p>预留新读者、主题读者与研究型读者路线。</p></article>
    </div>
  </section>
</main>
<script src="global-menu.js"></script>
</body>
</html>
